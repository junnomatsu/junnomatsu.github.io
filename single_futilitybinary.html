<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>単群奏功割合 中間No-Go基準シミュレーション</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@4.0.1/dist/pptxgen.bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root{--green:#28a745;--blue:#2196d3;--orange:#ff9800;--red:#dc3545;--line:#dfe3e7;--soft:#f7f9fa}
    *{box-sizing:border-box} body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:1040px;margin:20px auto;padding:0 18px;color:#30343b;line-height:1.5}
    h1{font-size:25px;margin:8px 0 15px} h2{font-size:20px} h3{font-size:17px;margin:25px 0 10px}.sub{font-size:13px;color:#667085;margin-top:-8px}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:12px 22px}.section{background:var(--soft);border:1px solid #e5e9ed;border-radius:7px;padding:12px}.section h3{margin:0 0 9px;font-size:15px;color:#4d5763}
    .row{display:flex;align-items:center;margin:7px 0;gap:8px}.row label{font-weight:650;flex:1}.row input{width:125px;padding:6px;border:1px solid #c9d0d7;border-radius:4px;font-size:14px}.highlight{background:#fff6d8!important;border-color:#e7b82d!important}
    button{width:100%;padding:11px;margin-top:13px;border:0;border-radius:5px;background:var(--green);color:#fff;font-size:16px;font-weight:700;cursor:pointer}button:hover{filter:brightness(.94)}.pptx-btn{background:#d24726}.pptx-btn:hover{background:#b83b20}
    #error{display:none;margin:12px 0;padding:10px;color:#a01919;background:#fff0f0;border-left:4px solid var(--red)}#results{display:none;margin-top:24px;padding:18px;background:var(--soft);border-left:5px solid #1677c8;border-radius:0 6px 6px 0}#nullBlock{border-left:5px solid var(--orange);padding-left:14px}
    .toggles{display:flex;flex-wrap:wrap;gap:8px 16px;padding:10px;background:#eef1f3;border-radius:5px;font-size:14px}.toggles label{white-space:nowrap}.summary{padding:13px 15px;margin:8px 0 18px;border-radius:6px;background:#e9f6ec;line-height:1.8}.summary.null{background:#fff2df;border-left:4px solid var(--orange)}
    table{width:100%;border-collapse:collapse;background:#fff;margin:10px 0 18px}th,td{border:1px solid var(--line);padding:8px;text-align:center}th{background:#e9edf0}.total{background:#f3f5f7;font-weight:700}
    .heat-wrap{overflow:auto;max-height:620px;border:1px solid var(--line);background:#fff}.heatmap{width:max-content;min-width:100%;margin:0;font-size:12px}.heatmap th,.heatmap td{min-width:46px;height:34px;padding:4px}.heatmap .axis{position:sticky;background:#e9edf0;z-index:2}.heatmap thead .axis{top:0}.heatmap tbody .axis{left:0}.heatmap td.impossible{background:#f5f5f5;color:#bbb}.heat-legend{display:flex;align-items:center;gap:6px;font-size:12px;margin:7px 0}.swatch{width:34px;height:13px}.chart{height:400px;margin:14px 0 25px}.tree{font-family:ui-monospace,Consolas,monospace;white-space:pre;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:6px;padding:14px;line-height:1.8}.go{color:var(--green);font-weight:700}.cont{color:#1677c8;font-weight:700}.nogo{color:var(--red);font-weight:700}.note{font-size:13px;color:#616a73}
    @media(max-width:720px){.inputs{grid-template-columns:1fr}.row label{font-size:14px}.chart{height:340px}#results{padding:12px}}
  </style>
</head>
<body>
  <h1>単群奏功割合 中間No-Go基準シミュレーション</h1>
  <div class="inputs">
    <section class="section"><h3>基本設定</h3>
      <div class="row"><label for="seed">乱数シード値</label><input id="seed" type="number" value="123456789" class="highlight"></div>
      <div class="row"><label for="sims">シミュレーション回数</label><input id="sims" type="number" value="10000" min="100" step="100"></div>
    </section>
    <section class="section"><h3>サンプルサイズ</h3>
      <div class="row"><label for="nFinal">最終N</label><input id="nFinal" type="number" value="20" min="2"></div>
      <div class="row"><label for="nInterim">中間時N</label><input id="nInterim" type="number" value="14" min="1"></div>
    </section>
    <section class="section"><h3>奏功割合</h3>
      <div class="row"><label for="h1">期待奏功割合 H1 (%)</label><input id="h1" type="number" value="45" min="0" max="100" step="0.1"></div>
      <div class="row"><label for="h0">無効奏功割合 H0 (%)</label><input id="h0" type="number" value="20" min="0" max="100" step="0.1"></div>
    </section>
    <section class="section"><h3>判定基準</h3>
      <div class="row"><label for="cutI">中間No-Go基準割合 (%)</label><input id="cutI" type="number" value="28" min="0" max="100" step="0.1"></div>
      <div class="row"><label for="cutF">最終 Go/No-Go基準割合 (%)</label><input id="cutF" type="number" value="35" min="0" max="100" step="0.1"></div>
      <div class="note">すべての判定は基準以上／基準未満です。</div>
    </section>
  </div>
  <button id="run">シミュレーション実行</button>
  <button id="downloadPptx" class="pptx-btn">PowerPointをダウンロード</button>
  <div id="error"></div>

  <main id="results">
    <div class="toggles"><strong>表示項目：</strong>
      <label><input type="checkbox" data-target="basic" checked> 基本結果</label>
      <label><input type="checkbox" data-target="effectBlock" checked> H1の詳細</label>
      <label><input type="checkbox" data-target="nullBlock" checked> H0の詳細</label>
      <label><input type="checkbox" data-class="heatSection" checked> ヒートマップ</label>
      <label><input type="checkbox" data-class="matrixSection" checked> 確率表</label>
      <label><input type="checkbox" data-class="treeSection" checked> ツリー</label>
      <label><input type="checkbox" data-class="chartSection" checked> 感度分析</label>
    </div>
    <section id="basic"><h2>シミュレーション結果</h2><strong>期待奏功割合 H1 の場合</strong><div id="summary1" class="summary"></div><strong>無効奏功割合 H0 の場合</strong><div id="summary0" class="summary null"></div><p id="ruleNote" class="note"></p></section>
    <section id="effectBlock"><h2>期待奏功割合 H1</h2><div id="detail1"></div></section>
    <section id="nullBlock"><h2>無効奏功割合 H0</h2><div id="detail0"></div></section>
  </main>

<script>
let state=123456789, charts=[];
function random(){state|=0;state^=state<<13;state^=state>>>17;state^=state<<5;return(state>>>0)/4294967296}
function binomial(n,p){let x=0;for(let i=0;i<n;i++)if(random()<p)x++;return x}
function val(id){return Number(document.getElementById(id).value)}
function pct(x){return x.toFixed(2)+'%'}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function validate(v){
  if(!Number.isInteger(v.sims)||v.sims<100||v.sims>1000000)return 'シミュレーション回数は100～1,000,000の整数で指定してください。';
  if(!Number.isInteger(v.nF)||!Number.isInteger(v.nI)||v.nI<1||v.nF<2||v.nI>=v.nF)return '中間時Nは1以上、最終N未満の整数で指定してください。';
  for(const [name,x] of [['H1',v.h1],['H0',v.h0],['中間No-Go基準',v.cI],['最終 Go/No-Go基準',v.cF]])if(!Number.isFinite(x)||x<0||x>100)return name+'割合は0～100%で指定してください。';
  if(v.h1<=v.h0)return '期待奏功割合 H1 は無効奏功割合 H0 より大きくしてください。'; return '';
}
function simulate(p,v){const out=[];for(let i=0;i<v.sims;i++){const xi=binomial(v.nI,p),xf=xi+binomial(v.nF-v.nI,p);out.push({xi,xf,pi:100*xi/v.nI,pf:100*xf/v.nF})}return out}
function classify(data,v,cut=v.cI){let gg=0,gn=0,cg=0,cn=0;for(const r of data){const ig=r.pi+1e-12>=cut,fg=r.pf+1e-12>=v.cF;if(ig&&fg)gg++;else if(ig)gn++;else if(fg)cg++;else cn++}return{gg,gn,cg,cn}}
function stats(c,n){const q=k=>100*k/n,ig=c.gg+c.gn,cont=c.cg+c.cn,fg=c.gg+c.cg;return{...c,pGG:q(c.gg),pGN:q(c.gn),pCG:q(c.cg),pCN:q(c.cn),pIG:q(ig),pCont:q(cont),pFG:q(fg),overall:q(c.gg+c.gn+c.cg),strict:q(fg)}}

function heatmap(data,v,label){
  const isH0=String(label).startsWith('H0'),rgb=isH0?'255,152,0':'25,138,209',light=isH0?'#fff3e0':'#eef6ff',dark=isH0?'#f28c00':'#198ad1';
  const grid=Array.from({length:v.nF+1},()=>Array(v.nI+1).fill(0));let max=0;
  data.forEach(r=>{grid[r.xf][r.xi]++;max=Math.max(max,grid[r.xf][r.xi])});
  let h='<div class="heatSection"><h3>中間 vs 最終 奏功者数ヒートマップ</h3><p class="note">横軸：中間奏功者数、縦軸：最終奏功者数。セル内は度数です。赤い縦線の列以右が中間継続、線より左が中間No-Go、赤い横線の行以上が最終Goです。</p><div class="heat-legend">少 <span class="swatch" style="background:'+light+'"></span><span class="swatch" style="background:'+dark+'"></span> 多</div><div class="heat-wrap"><table class="heatmap"><thead><tr><th class="axis">最終＼中間</th>';
  for(let x=0;x<=v.nI;x++)h+='<th class="axis" style="'+(x===v.xI?'border-left:3px solid #d32f2f':'')+'">'+x+'</th>';h+='</tr></thead><tbody>';
  for(let y=v.nF;y>=0;y--){h+='<tr><th class="axis" style="'+(y===v.xF?'border-top:3px solid #d32f2f':'')+'">'+y+'</th>';for(let x=0;x<=v.nI;x++){const impossible=y<x||y-x>v.nF-v.nI,n=grid[y][x],a=max?0.08+0.82*Math.sqrt(n/max):0;h+='<td class="'+(impossible?'impossible':'')+'" style="'+(y===v.xF?'border-top:3px solid #d32f2f;':'')+(x===v.xI?'border-left:3px solid #d32f2f;':'')+(!impossible?'background:rgba('+rgb+','+a+');color:'+(a>.55?'white':'#233'):'')+'" title="中間 '+x+'、最終 '+y+'：'+n+'回">'+(impossible?'–':n)+'</td>'}h+='</tr>'}return h+'</tbody></table></div></div>';
}
function matrix(s){return '<div class="matrixSection"><h3>確率マトリックス</h3><table><thead><tr><th>最終 ＼ 中間</th><th>継続</th><th>No-Go</th><th>合計</th></tr></thead><tbody><tr><th>Go</th><td><b>'+pct(s.pGG)+'</b></td><td><b>'+pct(s.pCG)+'</b></td><td class="total">'+pct(s.pFG)+'</td></tr><tr><th>No-Go</th><td>'+pct(s.pGN)+'</td><td>'+pct(s.pCN)+'</td><td class="total">'+pct(100-s.pFG)+'</td></tr><tr class="total"><th>合計</th><td>'+pct(s.pIG)+'</td><td>'+pct(s.pCont)+'</td><td>100.00%</td></tr></tbody></table></div>'}
function tree(s){const cond=(a,b)=>b?pct(100*a/b):'0.00%';return '<div class="treeSection"><h3>ディシジョンツリー</h3><div class="tree">試験開始 (100.00%)\n├─ <span class="cont">中間継続</span> ('+pct(s.pIG)+')\n│  ├─ <span class="go">最終Go</span> '+pct(s.pGG)+' （条件付き '+cond(s.gg,s.gg+s.gn)+'）\n│  └─ 最終No-Go '+pct(s.pGN)+' （条件付き '+cond(s.gn,s.gg+s.gn)+'）\n└─ <span class="nogo">中間No-Go</span> ('+pct(s.pCont)+')\n   ├─ 最終Go '+pct(s.pCG)+' （条件付き '+cond(s.cg,s.cg+s.cn)+'）\n   └─ 最終No-Go '+pct(s.pCN)+' （条件付き '+cond(s.cn,s.cg+s.cn)+'）</div></div>'}
function sensitivity(data,v,canvasId,label,color){const xs=[],gg=[],gn=[],cg=[],cn=[];for(let x=0;x<=v.nI+1;x++){const cut=100*x/v.nI,s=stats(classify(data,v,cut),v.sims);xs.push(cut);gg.push(s.pGG);gn.push(s.pGN);cg.push(s.pCG);cn.push(s.pCN)}return{xs,gg,gn,cg,cn,html:'<div class="chartSection"><h3>中間No-Go基準 感度分析</h3><div class="chart"><canvas id="'+canvasId+'"></canvas></div></div>',draw(){const ch=new Chart(document.getElementById(canvasId),{type:'line',data:{datasets:[{label:'CG（中間継続→最終Go）',data:xs.map((x,i)=>({x,y:gg[i]})),borderColor:'#28a745'},{label:'CN（中間継続→最終No-Go）',data:xs.map((x,i)=>({x,y:gn[i]})),borderColor:'#e0a800'},{label:'NG（中間No-Go→最終Go）',data:xs.map((x,i)=>({x,y:cg[i]})),borderColor:'#17a2b8'},{label:'NN（中間No-Go→最終No-Go）',data:xs.map((x,i)=>({x,y:cn[i]})),borderColor:'#dc3545'}]},options:{responsive:true,maintainAspectRatio:false,elements:{point:{radius:2}},scales:{x:{type:'linear',min:0,max:100,title:{display:true,text:'中間No-Go基準割合 (%)'},ticks:{callback:x=>x.toFixed(0)}},y:{min:0,max:100,title:{display:true,text:'確率 (%)'}}},plugins:{title:{display:true,text:label},legend:{position:'bottom'}}},plugins:[{afterDraw(chart){const x=chart.scales.x,ca=chart.chartArea,ctx=chart.ctx;ctx.save();ctx.strokeStyle='#d32f2f';ctx.lineWidth=2;ctx.setLineDash([6,3]);ctx.beginPath();ctx.moveTo(x.getPixelForValue(v.cI),ca.top);ctx.lineTo(x.getPixelForValue(v.cI),ca.bottom);ctx.stroke();ctx.restore()}}]});charts.push(ch)}}}
function detail(data,s,v,id,label,color){const sens=sensitivity(data,v,'chart'+id,label,color);document.getElementById('detail'+id).innerHTML=heatmap(data,v,label)+matrix(s)+tree(s)+sens.html;sens.draw()}
function run(){
  const v={sims:val('sims'),nF:val('nFinal'),nI:val('nInterim'),h1:val('h1'),h0:val('h0'),cI:val('cutI'),cF:val('cutF')};const err=validate(v),box=document.getElementById('error');if(err){box.textContent=err;box.style.display='block';document.getElementById('results').style.display='none';return}box.style.display='none';
  v.xI=Math.ceil(v.cI*v.nI/100-1e-12);v.xF=Math.ceil(v.cF*v.nF/100-1e-12);charts.forEach(c=>c.destroy());charts=[];state=(val('seed')|0)||123456789;const d0=simulate(v.h0/100,v);state=((val('seed')|0)||123456789)^0x6d2b79f5;const d1=simulate(v.h1/100,v),s0=stats(classify(d0,v),v.sims),s1=stats(classify(d1,v),v.sims);
  document.getElementById('summary0').innerHTML='中間解析での早期No-Go確率: <b>'+pct(s0.pCont)+'</b><br>最終No-Go確率（中間に関わらず）: <b>'+pct(100-s0.strict)+'</b><br>試験全体No-Go確率: <b>'+pct(100-s0.pGG)+'</b>';
  document.getElementById('summary1').innerHTML='試験全体のGo確率（中間継続かつ最終Go）: <b>'+pct(s1.pGG)+'</b><br>最終Go確率（中間に関わらず）: <b>'+pct(s1.strict)+'</b><br>中間No-GoによるGo確率減少分: <b>'+pct(s1.pCG)+'</b>';
  const noGoText=v.xI===0?'中間No-Goとなる奏功者数なし':'<b>'+(v.xI-1)+'/'+v.nI+'以下でNo-Go</b>';
  const finalNoGoText=v.xF===0?'最終No-Goとなる奏功者数なし':'<b>'+(v.xF-1)+'/'+v.nF+'以下でNo-Go</b>';
  document.getElementById('ruleNote').innerHTML='中間は <b>'+v.xI+'/'+v.nI+'（'+(100*v.xI/v.nI).toFixed(1)+'%）以上で継続</b>、'+noGoText+'。最終は <b>'+v.xF+'/'+v.nF+'（'+(100*v.xF/v.nF).toFixed(1)+'%）以上でGo</b>、'+finalNoGoText+'。すべての判定は基準以上／基準未満です。';
  detail(d0,s0,v,'0','H0における中間No-Go基準別の確率','#d32f2f');detail(d1,s1,v,'1','H1における中間No-Go基準別の確率','#d32f2f');document.getElementById('results').style.display='block';document.querySelectorAll('.toggles input').forEach(applyToggle);
}
function applyToggle(el){const show=el.checked;if(el.dataset.target){const x=document.getElementById(el.dataset.target);if(x)x.style.display=show?'block':'none'}else if(el.dataset.class)document.querySelectorAll('.'+el.dataset.class).forEach(x=>x.style.display=show?'block':'none')}
function addSlideFrame(pptx,slide,title){slide.background={color:'FFFFFF'};slide.addShape('rect',{x:0,y:0,w:13.333,h:.12,line:{color:'1F6FC2',transparency:100},fill:{color:'1F6FC2'}});slide.addText(title,{x:.42,y:.26,w:12.45,h:.45,fontFace:'Aptos',fontSize:22,bold:true,color:'243746',margin:0,fit:'shrink',wrap:false});slide.addText('出力日時: '+new Date().toLocaleString('ja-JP'),{x:.44,y:.76,w:4.5,h:.2,fontFace:'Aptos',fontSize:7.5,color:'64748B',margin:0})}
function addSectionLabel(slide,text,x,y,w,color){slide.addText(text,{x,y,w,h:.3,fontFace:'Aptos',fontSize:11,bold:true,color,margin:0,fit:'shrink',wrap:false})}
function matrixRows(selector,accent){const table=document.querySelector(selector);if(!table)return[];return Array.from(table.rows).map((row,ri)=>Array.from(row.cells).map((cell,ci)=>({text:cell.innerText.trim(),options:{bold:ri===0||ci===0||cell.classList.contains('total')||row.classList.contains('total'),color:ri===0?'FFFFFF':'263746',fill:ri===0?accent:(cell.classList.contains('total')||row.classList.contains('total')?'EAF0F6':'FFFFFF'),align:'center',valign:'middle',margin:.02,wrap:false,border:{type:'solid',color:'C9D5E2',pt:.5}}})))}
function domRichTextRuns(selector,baseColor='263746',preserveWhitespace=false){const root=document.getElementById(selector)||document.querySelector(selector),runs=[],colors={go:'28A745',cont:'007BFF',nogo:'DC3545'};const same=(a,b)=>a.bold===b.bold&&a.color===b.color&&!a.breakLine&&!b.breakLine;const br=()=>{if(runs.length)runs[runs.length-1].options.breakLine=true};function seg(text,opt){if(!text)return;text=text.replace(/🔹\s*/g,'');if(!preserveWhitespace)text=text.replace(/[\t\r ]+/g,' ');if(!preserveWhitespace&&(!runs.length||runs[runs.length-1].options.breakLine))text=text.replace(/^ +/,'');if(!text)return;const prev=runs[runs.length-1];if(prev&&same(prev.options,opt))prev.text+=text;else runs.push({text,options:{...opt}})}function add(text,opt,nodeBreaks=false){if(!text)return;if(!nodeBreaks){seg(text.replace(/[\r\n]+/g,' '),opt);return}const parts=text.replace(/\r/g,'').split('\n');parts.forEach((p,i)=>{seg(p,opt);if(i<parts.length-1)br()})}function walk(node,opt={}){if(node.nodeType===Node.TEXT_NODE){add(node.nodeValue,opt,preserveWhitespace);return}if(node.nodeType!==Node.ELEMENT_NODE)return;if(node.tagName==='BR'){br();return}const next={...opt};if(node.tagName==='B'||node.tagName==='STRONG')next.bold=true;Array.from(node.classList||[]).forEach(c=>{if(colors[c]){next.color=colors[c];next.bold=true}});node.childNodes.forEach(ch=>walk(ch,next))}root.childNodes.forEach(ch=>walk(ch,{color:baseColor}));while(runs.length&&!runs[0].text.trim())runs.shift();while(runs.length&&!runs[runs.length-1].text.trim())runs.pop();if(runs.length){runs[0].text=runs[0].text.replace(/^\s+/,'');runs[runs.length-1].text=runs[runs.length-1].text.replace(/\s+$/,'');delete runs[runs.length-1].options.breakLine}return runs}
async function captureHeatmap(selector){const section=document.querySelector(selector),wrap=section&&section.querySelector('.heat-wrap');if(!section||!wrap)return null;const old={maxHeight:wrap.style.maxHeight,overflow:wrap.style.overflow,height:wrap.style.height};wrap.style.maxHeight='none';wrap.style.overflow='visible';wrap.style.height='auto';try{return await html2canvas(section,{backgroundColor:'#FFFFFF',scale:1.5,useCORS:true,logging:false,width:section.scrollWidth,height:section.scrollHeight,windowWidth:Math.max(document.documentElement.clientWidth,section.scrollWidth),windowHeight:Math.max(document.documentElement.clientHeight,section.scrollHeight)})}finally{wrap.style.maxHeight=old.maxHeight;wrap.style.overflow=old.overflow;wrap.style.height=old.height}}
function addCanvasSlide(pptx,title,canvas){if(!canvas)return;const slide=pptx.addSlide();addSlideFrame(pptx,slide,title);const ratio=canvas.width/canvas.height,maxW=12,maxH=5.95;let w=maxW,h=w/ratio;if(h>maxH){h=maxH;w=h*ratio}slide.addImage({data:canvas.toDataURL('image/png'),x:(13.333-w)/2,y:1.15+(maxH-h)/2,w,h})}
function addChartSlide(pptx,title,chart){if(!chart)return;const slide=pptx.addSlide();addSlideFrame(pptx,slide,title);const ratio=chart.canvas.width/chart.canvas.height,maxW=12,maxH=5.95;let w=maxW,h=w/ratio;if(h>maxH){h=maxH;w=h*ratio}slide.addImage({data:chart.toBase64Image('image/png',1),x:(13.333-w)/2,y:1.15+(maxH-h)/2,w,h})}

dSectionLabel(slide,'確率マトリックス H1',4.57,1.02,4.1,'1F6FC2');slide.addTable(matrixRows('#detail1 .matrixSection table','1F6FC2'),{x:4.57,y:1.35,w:4.1,h:1.85,colW:[1.25,.95,.95,.95],rowH:.45,fontFace:'Aptos',fontSize:11,margin:.02,valign:'middle',autoFit:false,fit:'shrink',wrap:false});addSectionLabel(slide,'確率マトリックス H0',4.57,3.7,4.1,'D97706');slide.addTable(matrixRows('#detail0 .matrixSection table','D97706'),{x:4.57,y:4.03,w:4.1,h:1.85,colW:[1.25,.95,.95,.95],rowH:.45,fontFace:'Aptos',fontSize:11,margin:.02,valign:'middle',autoFit:false,fit:'shrink',wrap:false});addSectionLabel(slide,'ディシジョンツリー H1',8.9,1.02,4.03,'1F6FC2');slide.addText(domRichTextRuns('#detail1 .tree','263746',true),{x:8.9,y:1.35,w:4.03,h:2.08,fontFace:'Courier New',fontSize:11,color:'263746',line:{color:'A8CBEA',pt:.7},margin:.055,fit:'shrink',valign:'middle',wrap:false});addSectionLabel(slide,'ディシジョンツリー H0',8.9,3.7,4.03,'D97706');slide.addText(domRichTextRuns('#detail0 .tree','263746',true),{x:8.9,y:4.03,w:4.03,h:2.08,fontFace:'Courier New',fontSize:11,color:'263746',line:{color:'F2C078',pt:.7},margin:.055,fit:'shrink',valign:'middle',wrap:false});slide.addText(domRichTextRuns('ruleNote'),{x:4.57,y:6.56,w:8.36,h:.42,fontFace:'Aptos',fontSize:8,color:'556575',margin:.02,fit:'shrink',valign:'top',wrap:true});const heat1=await captureHeatmap('#detail1 .heatSection'),heat0=await captureHeatmap('#detail0 .heatSection');addCanvasSlide(pptx,'中間 vs 最終 奏功者数ヒートマップ（H1）',heat1);addCanvasSlide(pptx,'中間 vs 最終 奏功者数ヒートマップ（H0）',heat0);addChartSlide(pptx,'中間No-Go基準 感度分析（H1）',Chart.getChart('chart1'));addChartSlide(pptx,'中間No-Go基準 感度分析（H0）',Chart.getChart('chart0'));const date=new Date(),stamp=''+date.getFullYear()+String(date.getMonth()+1).padStart(2,'0')+String(date.getDate()).padStart(2,'0');await pptx.writeFile({fileName:'single_futility_binary_results_'+stamp+'.pptx',compression:true})}
