    <script>
function ctSelectedDigits(id, fallback) {
    const el = document.getElementById(id);
    const value = el ? Number(el.value) : fallback;
    return Number.isInteger(value) ? value : fallback;
}

function ctProbabilityDigits() {
    return ctSelectedDigits('probabilityDigits', 1);
}

function ctAlphaPValueDigits() {
    return ctSelectedDigits('pvalueDigits', 3);
}

function ctThresholdDigits() {
    return ctSelectedDigits('thresholdDigits', 3);
}

function ctFmtFixed(value, digits) {
    const number = Number(value);
    return Number.isFinite(number) ? number.toFixed(digits) : '-';
}

function ctFmtPct(value) {
    return ctFmtFixed(value, ctProbabilityDigits());
}

function ctFmtAlphaP(value) {
    return ctFmtFixed(value, ctAlphaPValueDigits());
}

function ctFmtThreshold(value) {
    return ctFmtFixed(value, ctThresholdDigits());
}

function ctInputDecimalPlaces(id) {
    const el = document.getElementById(id);
    if (!el) return 0;
    const raw = String(el.value || '');
    const match = raw.match(/[.,](\d+)/);
    return match ? match[1].length : 0;
}

function ctFmtLikeInput(value, inputId) {
    return ctFmtFixed(value, ctInputDecimalPlaces(inputId));
}

    <script>
function normCDF(x) {
            if (!Number.isFinite(x)) return x < 0 ? 0 : 1;
            const t = 1 / (1 + 0.2316419 * Math.abs(x));
            let d = 0.3989422804014327 * Math.exp(-0.5 * x * x);
            d *= t * (0.319381530 + t * (-0.356563782 + t * (1.781477937 +
                 t * (-1.821255978 + t * 1.330274429))));
            return x >= 0 ? 1 - d : d;
        }

        function normPPF(p) {
            if (!(p > 0 && p < 1)) throw new Error('normPPF: p must be between 0 and 1');
            const a = [-3.969683028665376e+01, 2.209460984245205e+02, -2.759285104469687e+02, 1.383577518672690e+02, -3.066479806614716e+01, 2.506628277459239e+00];
            const b = [-5.447609879822406e+01, 1.615858368580409e+02, -1.556989798598866e+02, 6.680131188771972e+01, -1.328068155288572e+01];
            const c = [-7.784894002430293e-03, -3.223964580411365e-01, -2.400758277161838e+00, -2.549732539343734e+00, 4.374664141464968e+00, 2.938163982698783e+00];
            const d = [7.784695709041462e-03, 3.224671290700398e-01, 2.445134137142996e+00, 3.754408661907416e+00];
            const plow = 0.02425;
            const phigh = 1 - plow;
            let q, r;
            if (p < plow) {
                q = Math.sqrt(-2 * Math.log(p));
                return (((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
                       ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1);
            }
            if (p > phigh) {
                q = Math.sqrt(-2 * Math.log(1 - p));
                return -(((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
                         ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1);
            }
            q = p - 0.5;
            r = q * q;
            return (((((a[0] * r + a[1]) * r + a[2]) * r + a[3]) * r + a[4]) * r + a[5]) * q /
                   (((((b[0] * r + b[1]) * r + b[2]) * r + b[3]) * r + b[4]) * r + 1);
        }

        function getZCritical(alpha, isOneSided) {
            if (!(alpha > 0 && alpha < 1)) throw new Error('有意水準 α は 0 より大きく 1 より小さい値にしてください。');
            const tailProb = isOneSided ? alpha : alpha / 2;
            return normPPF(1 - tailProb);
        }



        function normPDF(x, mean, se) {
            const z = (x - mean) / se;
            return Math.exp(-0.5 * z * z) / (se * Math.sqrt(2 * Math.PI));
        }

        function survivalNormal(x, mean, se) {
            return 1 - normCDF((x - mean) / se);
        }

        let normalDistributionChart = null;
        let survivalFunctionChart = null;
        let latestChartParams = null;

        function makeChartData(mean0, mean1, se, thresholdDelta) {
            const minX = Math.min(mean0 - 4 * se, mean1 - 4 * se, thresholdDelta - 2 * se);
            const maxX = Math.max(mean0 + 4 * se, mean1 + 4 * se, thresholdDelta + 2 * se);
            const steps = 160;
            const pdfH0 = [];
            const pdfH1 = [];
            const survH0 = [];
            const survH1 = [];
            let maxPdf = 0;

            for (let i = 0; i <= steps; i++) {
                const x = minX + (maxX - minX) * i / steps;
                const y0 = normPDF(x, mean0, se);
                const y1 = normPDF(x, mean1, se);
                pdfH0.push({ x, y: y0 });
                pdfH1.push({ x, y: y1 });
                survH0.push({ x, y: survivalNormal(x, mean0, se) });
                survH1.push({ x, y: survivalNormal(x, mean1, se) });
                maxPdf = Math.max(maxPdf, y0, y1);
            }

            return { minX, maxX, maxPdf, pdfH0, pdfH1, survH0, survH1 };
        }

        const verticalLinePlugin = {
            id: 'verticalThresholdLine',
            afterDatasetsDraw(chart, args, pluginOptions) {
                const value = pluginOptions.value;
                if (!Number.isFinite(value)) return;

                const { ctx, chartArea, scales } = chart;
                const x = scales.x.getPixelForValue(value);
                if (x < chartArea.left || x > chartArea.right) return;

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(x, chartArea.top);
                ctx.lineTo(x, chartArea.bottom);
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#dc3545';
                ctx.setLineDash([6, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = '#dc3545';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText('有意閾値 Δ', Math.min(x + 6, chartArea.right - 76), chartArea.top + 6);
                ctx.restore();
            }
        };

        if (typeof Chart !== 'undefined') {
            Chart.register(verticalLinePlugin);
        }

        function updateCharts(params) {
            latestChartParams = params;
            if (typeof Chart === 'undefined') return;

            const { mean0, mean1, se, thresholdDelta } = params;
            const data = makeChartData(mean0, mean1, se, thresholdDelta);
            const orange = '#f28c28';
            const lightBlue = '#38bdf8';
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                interaction: { mode: 'nearest', intersect: false },
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return `${context.dataset.label}: x=${ctFmtThreshold(Number(context.parsed.x))}, y=${ctFmtPct(Number(context.parsed.y) * 100)}%`;
                            }
                        }
                    },
                    verticalThresholdLine: { value: thresholdDelta }
                },
                scales: {
                    x: { type: 'linear', title: { display: true, text: '差 Δ' } },
                    y: { beginAtZero: true }
                }
            };

            const normalConfig = {
                type: 'line',
                data: {
                    datasets: [
                        { label: '帰無仮説 H0', data: data.pdfH0, borderColor: orange, backgroundColor: orange, borderWidth: 2, pointRadius: 0, tension: 0.25, parsing: false },
                        { label: '対立仮説 H1', data: data.pdfH1, borderColor: lightBlue, backgroundColor: lightBlue, borderWidth: 2, pointRadius: 0, tension: 0.25, parsing: false },
                    ]
                },
                options: {
                    ...commonOptions,
                    scales: {
                        x: { type: 'linear', title: { display: true, text: '差 Δ' }, min: data.minX, max: data.maxX },
                        y: { beginAtZero: true, title: { display: true, text: '密度' }, suggestedMax: data.maxPdf * 1.1 }
                    }
                }
            };

            const survivalConfig = {
                type: 'line',
                data: {
                    datasets: [
                        { label: '帰無仮説 H0: αエラー', data: data.survH0, borderColor: orange, backgroundColor: orange, borderWidth: 2, pointRadius: 0, tension: 0.25, parsing: false },
                        { label: '対立仮説 H1: 検出力', data: data.survH1, borderColor: lightBlue, backgroundColor: lightBlue, borderWidth: 2, pointRadius: 0, tension: 0.25, parsing: false },
                    ]
                },
                options: {
                    ...commonOptions,
                    scales: {
                        x: { type: 'linear', title: { display: true, text: '閾値 Δ' }, min: data.minX, max: data.maxX },
                        y: { min: 0, max: 1, title: { display: true, text: '確率' } }
                    }
                }
            };

            if (normalDistributionChart) normalDistributionChart.destroy();
            if (survivalFunctionChart) survivalFunctionChart.destroy();
            normalDistributionChart = new Chart(document.getElementById('normalDistributionChart'), normalConfig);
            survivalFunctionChart = new Chart(document.getElementById('survivalFunctionChart'), survivalConfig);
            updateChartVisibility();
        }

        function updateChartVisibility() {
            const showNormal = document.getElementById('showNormalChart')?.checked;
            const showSurvival = document.getElementById('showSurvivalChart')?.checked;
            const chartsArea = document.getElementById('chartsArea');
            const normalBox = document.getElementById('normalChartBox');
            const survivalBox = document.getElementById('survivalChartBox');
            if (!chartsArea || !normalBox || !survivalBox) return;

            normalBox.style.display = showNormal ? 'block' : 'none';
            survivalBox.style.display = showSurvival ? 'block' : 'none';
            chartsArea.style.display = (showNormal || showSurvival) ? 'flex' : 'none';
            chartsArea.classList.toggle('single-chart', (showNormal && !showSurvival) || (!showNormal && showSurvival));
        }

        function calcPowerFromAlpha(nTreat, nControl, delta, sd, alpha, isOneSided) {
            const se = Math.sqrt(sd * sd / nTreat + sd * sd / nControl);
            const zAlpha = getZCritical(alpha, isOneSided);
            const ncp = delta / se;
            if (isOneSided) return 1 - normCDF(zAlpha - ncp);
            return 1 - normCDF(zAlpha - ncp) + normCDF(-zAlpha - ncp);
        }

        function calcPowerFromThreshold(nTreat, nControl, delta, sd, thresholdDelta) {
            const se = Math.sqrt(sd * sd / nTreat + sd * sd / nControl);
            return 1 - normCDF((thresholdDelta - delta) / se);
        }

        function calcOneSidedAlphaFromThreshold(nTreat, nControl, sd, thresholdDelta) {
            const se = Math.sqrt(sd * sd / nTreat + sd * sd / nControl);
            const z = thresholdDelta / se;
            return 1 - normCDF(z);
        }

        function gcd(a, b) {
            a = Math.abs(a); b = Math.abs(b);
            while (b) [a, b] = [b, a % b];
            return a || 1;
        }

        function ratioToIntegers(treatText, controlText) {
            const decimals = value => ((String(value).split('.')[1] || '').length);
            const scale = 10 ** Math.max(decimals(treatText), decimals(controlText));
            let treat = Math.round(Number(treatText) * scale);
            let control = Math.round(Number(controlText) * scale);
            const divisor = gcd(treat, control);
            return { treat: treat / divisor, control: control / divisor };
        }

        function getPostDropoutN(nBefore, dropoutRate, roundingMethod) {
            const raw = nBefore * (1 - dropoutRate / 100);
            // 脱落前Nの逆算方法と対応させ、切り上げ時は保証できる整数Nを採用する。
            return Math.max(2, roundingMethod === 'round' ? Math.round(raw) : Math.floor(raw));
        }

        function getPreDropoutN(nAfter, dropoutRate, roundingMethod) {
            const remain = 1 - dropoutRate / 100;
            if (!(remain > 0)) return NaN;
            const raw = nAfter / remain;
            return roundingMethod === 'round' ? Math.round(raw) : Math.ceil(raw);
        }

        let history = [];
        let counter = 0;

        function calculateSampleSize() {
            const inputMode = document.getElementById('inputMode').value;
            const targetPowerPercent = parseFloat(document.getElementById('targetPowerInput').value);
            const targetPower = targetPowerPercent / 100;
            const alpha = parseFloat(document.getElementById('alphaInput').value);
            const thresholdInput = parseFloat(document.getElementById('thresholdInput').value);
            const isOneSided = document.getElementById('testType').value === 'one';
            const delta = parseFloat(document.getElementById('deltaInput').value);
            const sd = parseFloat(document.getElementById('sdInput').value);
            const ratioTreat = parseFloat(document.getElementById('ratioTreat').value);
            const ratioControl = parseFloat(document.getElementById('ratioControl').value);
            const ratioTreatText = document.getElementById('ratioTreat').value;
            const ratioControlText = document.getElementById('ratioControl').value;
            const dropoutRateTreat = parseFloat(document.getElementById('dropoutRateTreat').value);
            const dropoutRateControl = parseFloat(document.getElementById('dropoutRateControl').value);
            const ratioBasis = document.getElementById('ratioBasis').value;
            const preRounding = document.getElementById('preDropoutRounding').value;

            const resultEl = document.getElementById('sampleSizeResult');
            const detailEl = document.getElementById('detailResult');

            if (!(targetPower > 0 && targetPower < 1)) return showError('目標検出力は 0% より大きく 100% より小さい値にしてください。');
            if (!(sd > 0)) return showError('SD は 0 より大きい値にしてください。');
            if (!(delta !== 0 && Number.isFinite(delta))) return showError('平均値の差 Δ は 0 以外の値にしてください。');
            if (!(ratioTreat > 0 && ratioControl > 0)) return showError('群間比は 0 より大きい値にしてください。');
            if (!(dropoutRateTreat >= 0 && dropoutRateTreat < 100)) return showError('治療群の脱落率は 0%以上 100%未満にしてください。');
            if (!(dropoutRateControl >= 0 && dropoutRateControl < 100)) return showError('対照群の脱落率は 0%以上 100%未満にしてください。');
            if (inputMode === 'alpha' && !(alpha > 0 && alpha < 1)) return showError('α は 0 より大きく 1 より小さい値にしてください。');
            if (inputMode === 'threshold' && !(thresholdInput > 0)) return showError('有意閾値Δは 0 より大きい値にしてください。');

            const absDelta = Math.abs(delta);
            const absThreshold = Math.abs(thresholdInput);
            let found = null;
            const maxN = 100000;
            const integerRatio = ratioToIntegers(ratioTreatText, ratioControlText);

            for (let multiplier = 1; multiplier * (integerRatio.treat + integerRatio.control) <= maxN; multiplier++) {
                let nTreatBefore, nControlBefore, nTreatAfter, nControlAfter;
                if (ratioBasis === 'before') {
                    nTreatBefore = multiplier * integerRatio.treat;
                    nControlBefore = multiplier * integerRatio.control;
                    if (nTreatBefore < 2 || nControlBefore < 2) continue;
                    nTreatAfter = getPostDropoutN(nTreatBefore, dropoutRateTreat, preRounding);
                    nControlAfter = getPostDropoutN(nControlBefore, dropoutRateControl, preRounding);
                } else {
                    nTreatAfter = multiplier * integerRatio.treat;
                    nControlAfter = multiplier * integerRatio.control;
                    if (nTreatAfter < 2 || nControlAfter < 2) continue;
                    nTreatBefore = getPreDropoutN(nTreatAfter, dropoutRateTreat, preRounding);
                    nControlBefore = getPreDropoutN(nControlAfter, dropoutRateControl, preRounding);
                }
                const power = inputMode === 'alpha'
                    ? calcPowerFromAlpha(nTreatAfter, nControlAfter, absDelta, sd, alpha, isOneSided)
                    : calcPowerFromThreshold(nTreatAfter, nControlAfter, absDelta, sd, absThreshold);
                if (power >= targetPower) {
                    found = { nTreat: nTreatAfter, nControl: nControlAfter,
                        nTreatBefore, nControlBefore,
                        totalAfter: nTreatAfter + nControlAfter, power };
                    break;
                }
            }

            if (!found) return showError('指定条件では探索上限内で目標検出力に到達しませんでした。Δ、SD、αまたは有意閾値Δ、目標検出力を確認してください。');

            const nTreatBefore = found.nTreatBefore;
            const nControlBefore = found.nControlBefore;
            const totalBefore = nTreatBefore + nControlBefore;
            const se = Math.sqrt(sd * sd / found.nTreat + sd * sd / found.nControl);

            let thresholdDelta, zValue, alphaDisplay, testLabel, modeLabel;
            if (inputMode === 'alpha') {
                zValue = getZCritical(alpha, isOneSided);
                thresholdDelta = zValue * se;
                alphaDisplay = alpha;
                testLabel = isOneSided ? '片側' : '両側';
                modeLabel = 'α指定';
            } else {
                thresholdDelta = absThreshold;
                zValue = thresholdDelta / se;
                const oneSidedAlpha = calcOneSidedAlphaFromThreshold(found.nTreat, found.nControl, sd, thresholdDelta);
                alphaDisplay = oneSidedAlpha;
                testLabel = '片側';
                modeLabel = '閾値指定';
            }

            const powerPercent = ctFmtPct(found.power * 100);

            resultEl.innerHTML = '';
            detailEl.innerHTML = `
                <table>
                    <thead>
                        <tr><th></th><th>治療群</th><th>対照群</th><th>合計</th></tr>
                    </thead>
                    <tbody>
                        <tr><th>脱落前N</th><td>${nTreatBefore}</td><td>${nControlBefore}</td><td class="total-n">${totalBefore}</td></tr>
                        <tr><th>脱落後N</th><td>${found.nTreat}</td><td>${found.nControl}</td><td class="total-n">${found.totalAfter}</td></tr>
                    </tbody>
                </table>
                <div class="summary-line">
                    入力モード: <strong>${modeLabel}</strong> / 実際の検出力: <strong>${powerPercent}%</strong> / 有意閾値 Δ: <strong>${ctFmtThreshold(thresholdDelta)}</strong><br>
                    群間比の適用先: <strong>${ratioBasis === 'before' ? '脱落前N' : '脱落後N'}</strong>（治療群:対照群 = ${ratioTreat}:${ratioControl}）
                    / 脱落率: 治療群 <strong>${dropoutRateTreat}%</strong>・対照群 <strong>${dropoutRateControl}%</strong>
                </div>
            `;

            updateCharts({ mean0: 0, mean1: absDelta, se, thresholdDelta });

            counter++;
            history.unshift({
                no: counter,
                mode: modeLabel,
                targetPower: ctFmtLikeInput(targetPowerPercent, 'targetPowerInput'),
                before: `${nTreatBefore}/${nControlBefore} (${totalBefore})`,
                after: `${found.nTreat}/${found.nControl} (${found.totalAfter})`,
                ratio: `${ratioTreat}:${ratioControl}`,
                ratioBasis: ratioBasis === 'before' ? '脱落前N' : '脱落後N',
                rounding: document.getElementById('preDropoutRounding').selectedOptions[0].text,
                dropout: `${dropoutRateTreat}% / ${dropoutRateControl}%`,
                nTreatBefore,
                nControlBefore,
                totalBefore,
                nTreatAfter: found.nTreat,
                nControlAfter: found.nControl,
                totalAfter: found.totalAfter,
                delta: ctFmtLikeInput(delta, 'deltaInput'),
                thresholdDelta: ctFmtThreshold(thresholdDelta),
                sd: ctFmtLikeInput(sd, 'sdInput'),
                alpha: ctFmtAlphaP(alphaDisplay),
                test: testLabel,
                power: powerPercent
            });
            renderHistory();
        }

        function showError(message) {
            document.getElementById('sampleSizeResult').innerHTML = `<span class="error">${message}</span>`;
            document.getElementById('detailResult').innerHTML = '';
        }

        function renderHistory() {
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = '';
            history.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <div class="move-buttons">
                            <button class="move-btn" onclick="moveHistoryItem(${index}, -1)" ${index === 0 ? 'disabled' : ''}>▲</button>
                            <button class="move-btn" onclick="moveHistoryItem(${index}, 1)" ${index === history.length - 1 ? 'disabled' : ''}>▼</button>
                        </div>
                    </td>
                    <td>${item.targetPower}%</td>
                    <td>${item.before}</td>
                    <td>${item.after}</td>
                    <td>${item.ratio}</td>
                    <td>${item.dropout}</td>
                    <td>${item.delta}</td>
                    <td style="font-weight:bold; color:#d32f2f;">${item.thresholdDelta}</td>
                    <td>${item.sd}</td>
                    <td>${item.alpha}</td>
                    <td>${item.test}</td>
                    <td style="font-weight:bold; color:#28a745;">${item.power}%</td>
                    <td><button class="delete-btn" onclick="deleteHistoryItem(${index})">🗑️</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        window.moveHistoryItem = function(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= history.length) return;

            const [movedItem] = history.splice(index, 1);
            history.splice(newIndex, 0, movedItem);
            renderHistory();
        };

        window.deleteHistoryItem = function(index) {
            history.splice(index, 1);
            renderHistory();
        };

        function clearHistory() {
            history = [];
            counter = 0;
            renderHistory();
        }

        function addPptTitle(slide, title, subtitle) {
            slide.background = { color: 'F7F9FC' };
            slide.addShape('rect', { x: 0, y: 0, w: 13.333, h: 0.18, fill: { color: '1565C0' }, line: { color: '1565C0' } });
            slide.addText(title, { x: 0.55, y: 0.35, w: 12.2, h: 0.48, fontFace: 'Aptos', fontSize: 24, bold: true, color: '263238', margin: 0 });
            if (subtitle) slide.addText(subtitle, { x: 0.57, y: 0.88, w: 12, h: 0.28, fontFace: 'Aptos', fontSize: 9.5, color: '65737E', margin: 0 });
        }

        async function downloadPowerPoint() {
            const button = document.getElementById('downloadPptxButton');
            if (typeof PptxGenJS === 'undefined') {
                alert('PowerPoint生成ライブラリを読み込めませんでした。インターネット接続を確認して再読み込みしてください。');
                return;
            }
            if (!history.length) {
                alert('先に「必要Nを計算」を実行してください。');
                return;
            }

            button.disabled = true;
            button.textContent = 'PowerPointを作成中…';
            try {
                const latest = history[0];
                const pptx = new PptxGenJS();
                pptx.layout = 'LAYOUT_WIDE';
                pptx.author = '臨床試験 2群平均差 必要症例数計算';
                pptx.subject = '必要症例数計算結果';
                pptx.title = '臨床試験 2群平均差 必要症例数計算結果';
                pptx.lang = 'ja-JP';
                pptx.theme = { headFontFace: 'Aptos', bodyFontFace: 'Aptos', lang: 'ja-JP' };

                const slide = pptx.addSlide();
                addPptTitle(slide, '2群平均差 必要症例数計算結果', `出力日時: ${new Date().toLocaleString('ja-JP')}`);
                slide.addShape('roundRect', { x: 0.55, y: 1.25, w: 3.30, h: 0.88, fill: { color: 'E3F2FD' }, line: { color: '90CAF9', width: 1 } });
                slide.addText('合計N', { x: 0.73, y: 1.38, w: 0.62, h: 0.24, fontFace: 'Aptos', fontSize: 11.5, bold: true, color: '34536F', margin: 0 });
                slide.addText(`脱落前 ${latest.totalBefore}`, { x: 1.35, y: 1.31, w: 1.98, h: 0.3, fontFace: 'Aptos', fontSize: 18, bold: true, color: '1565C0', margin: 0, align: 'right' });
                slide.addText(`脱落後 ${latest.totalAfter}`, { x: 1.35, y: 1.68, w: 1.98, h: 0.27, fontFace: 'Aptos', fontSize: 14, bold: true, color: '427AA8', margin: 0, align: 'right' });

                const summaryRows = [
                    [{ text: '項目', options: { bold: true, color: 'FFFFFF', fill: '1565C0' } }, { text: '入力・算出値', options: { bold: true, color: 'FFFFFF', fill: '1565C0' } }],
                    ['入力モード / 丸め', `${latest.mode} / ${latest.rounding}`],
                    ['目標/実検出力', `${latest.targetPower}% / ${latest.power}%`],
                    ['脱落前N (治/対)', `${latest.nTreatBefore} / ${latest.nControlBefore}`],
                    ['脱落後N (治/対)', `${latest.nTreatAfter} / ${latest.nControlAfter}`],
                    ['群間比/適用先', `${latest.ratio} / ${latest.ratioBasis === '脱落前N' ? '前N' : '後N'}`],
                    ['脱落率 (治/対)', latest.dropout],
                    ['平均差Δ/共通SD', `${latest.delta} / ${latest.sd}`],
                    ['有意閾値 Δ', latest.thresholdDelta],
                    ['α / 検定', `${latest.alpha} / ${latest.test}`]
                ];
                slide.addTable(summaryRows, {
                    x: 0.55, y: 2.28, w: 3.30, h: 4.35,
                    border: { type: 'solid', color: 'B8C7D9', pt: 0.65 },
                    fill: 'FFFFFF', color: '263238', fontFace: 'Aptos', fontSize: 11.0,
                    margin: 0.045, rowH: 0.47, valign: 'middle',
                    columnW: [1.50, 1.80], autoFit: false
                });

                const chartImages = [];
                if (document.getElementById('showNormalChart').checked && normalDistributionChart) {
                    chartImages.push({ title: '確率密度関数', image: normalDistributionChart.toBase64Image() });
                }
                if (document.getElementById('showSurvivalChart').checked && survivalFunctionChart) {
                    chartImages.push({ title: '1−累積分布関数', image: survivalFunctionChart.toBase64Image() });
                }
                if (chartImages.length === 2) {
                    chartImages.forEach((chart, i) => {
                        const x = 4.08 + i * 4.55;
                        slide.addText(chart.title, { x, y: 1.36, w: 4.25, h: 0.3, align: 'center', fontFace: 'Aptos', fontSize: 13, bold: true, color: '264F73', margin: 0 });
                        slide.addImage({ data: chart.image, x, y: 1.78, w: 4.25, h: 4.25 });
                    });
                } else if (chartImages.length === 1) {
                    slide.addText(chartImages[0].title, { x: 6.18, y: 1.36, w: 4.8, h: 0.3, align: 'center', fontFace: 'Aptos', fontSize: 13, bold: true, color: '264F73', margin: 0 });
                    slide.addImage({ data: chartImages[0].image, x: 6.45, y: 1.78, w: 4.25, h: 4.25 });
                } else {
                    slide.addText('図は画面設定で非表示のため、出力対象外です。', { x: 5.0, y: 3.6, w: 7, h: 0.4, align: 'center', fontFace: 'Aptos', fontSize: 12, color: '6C757D', margin: 0 });
                }

                const rowsPerSlide = 12;
                for (let start = 0; start < history.length; start += rowsPerSlide) {
                    const part = history.slice(start, start + rowsPerSlide);
                    const historySlide = pptx.addSlide();
                    addPptTitle(historySlide, '計算履歴', `${start + 1}–${start + part.length}件目 / 全${history.length}件`);
                    const head = label => ({ text: label, options: { bold: true, color: 'FFFFFF', fill: '1565C0' } });
                    const rows = [[
                        head('目標検出力'), head('前N (治/対/計)'), head('後N (治/対/計)'),
                        head('比・適用先'), head('脱落率 (治/対)'), head('平均差Δ'), head('有意閾値Δ'),
                        head('SD'), head('α'), head('モード・検定'), head('実検出力')
                    ]];
                    part.forEach(item => rows.push([
                        `${item.targetPower}%`, item.before, item.after, `${item.ratio} / ${item.ratioBasis === '脱落前N' ? '前N' : '後N'}`,
                        item.dropout, item.delta, item.thresholdDelta, item.sd, item.alpha, `${item.mode} / ${item.test}`, `${item.power}%`
                    ]));
                    historySlide.addTable(rows, {
                        x: 0.25, y: 1.30, w: 12.83, h: 5.8,
                        border: { type: 'solid', color: 'B8C7D9', pt: 0.55 },
                        fill: 'FFFFFF', color: '263238', fontFace: 'Aptos', fontSize: 11.0,
                        margin: 0.035, rowH: 0.42, valign: 'middle', align: 'center',
                        columnW: [0.94, 1.58, 1.58, 1.37, 1.44, 0.86, 1.14, 0.72, 0.96, 1.24, 1.00],
                        autoFit: false
                    });
                }

                const stamp = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                await pptx.writeFile({ fileName: `normal_samplesize_results_${stamp}.pptx`, compression: true });
            } catch (error) {
                console.error(error);
                alert(`PowerPointの作成に失敗しました: ${error.message || error}`);
            } finally {
                button.disabled = false;
                button.textContent = 'PowerPointをダウンロード';
            }
        }

        function updateInputMode() {
            const inputMode = document.getElementById('inputMode').value;
            const isThresholdMode = inputMode === 'threshold';
            document.getElementById('alphaGroup').classList.toggle('hidden', isThresholdMode);
            document.getElementById('thresholdGroup').classList.toggle('hidden', !isThresholdMode);
            document.getElementById('testTypeGroup').classList.toggle('hidden', isThresholdMode);
            document.getElementById('modeNote').textContent = isThresholdMode
                ? '有意閾値Δを指定し、候補NごとのSEから片側αを逆算して必要Nを計算します。'
                : 'αを指定して、有意閾値Δと必要Nを計算します。';
            if (isThresholdMode) document.getElementById('testType').value = 'one';
        }

        document.getElementById('showNormalChart').addEventListener('change', updateChartVisibility);
        document.getElementById('showSurvivalChart').addEventListener('change', updateChartVisibility);

        document.getElementById('inputMode').addEventListener('change', () => {
            updateInputMode();
            calculateSampleSize();
        });

        window.onload = function() {
            updateInputMode();
            calculateSampleSize();
        };

</script>
