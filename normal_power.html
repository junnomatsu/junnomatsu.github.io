    <style>
        body { font-family: sans-serif; max-width: 1200px; margin: 20px auto; padding: 0 20px; line-height: 1.5; color: #333; }
        .main-container { display: flex; gap: 25px; align-items: flex-start; }

        #results { margin-top: 12px; padding: 10px; background-color: #f8f9fa; border-left: 5px solid #007bff; border-radius: 0 4px 4px 0; }
        .res-total { font-size: 29px; margin: 6px 0; padding: 10px; background-color: #e8f4e8; border-radius: 6px; line-height: 1.3; text-align: center; font-weight: bold; }

        .chart-container {

        table { width: 100%; border-collapse: collapse; margin: 10px 0; background-color: #fff; }
        th, td { border: 1px solid #dee2e6; padding: 7px 6px; text-align: center; font-size: 13.5px; }
        th { background-color: #e9ecef; font-weight: bold; }
        .history-table { max-height: 560px; overflow-y: auto; }
        .delete-btn {
            background-color: #dc3545;

        .move-buttons {
            display: flex;
            flex-direction: column;
            gap: 3px;
            align-items: center;
        }
        .move-btn {
            background-color: #6c757d;
            width: 30px;
            padding: 2px 0;
            font-size: 12px;
            line-height: 1.1;
            border-radius: 3px;
        }
        .move-btn:hover { background-color: #5a6268; }
        .move-btn:disabled {

        .top-link { display: inline-block; margin-bottom: 8px; font-size: 13px; color: #666; text-decoration: none; }
        .top-link:hover { color: #333; text-decoration: underline; }    </style>
</head>
<body>
    <a class="top-link" href="index.html">トップページへ</a>
    <h1>臨床試験 2群平均差 検出力計算</h1>
    <hr>

    <div class="main-container">
        <div class="input-area">
            <div class="inputs-container">
                <div class="input-group">
                    <label for="calculationMode">入力モード:</label>
                    <select id="calculationMode">
                        <option value="alpha" selected>αから有意閾値を計算</option>
                        <option value="threshold">有意閾値Δから片側αを計算</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="alphaInput">有意水準 (α):</label>
                    <input type="number" id="alphaInput" value="0.025" step="0.001" min="0.001" max="0.5">
                    <div class="helper-text">αモードで使用。両側検定では両側αとして扱います。</div>
                </div>
                <div class="input-group">
                    <label for="thresholdInput">有意閾値 Δ:</label>
                    <input type="number" id="thresholdInput" value="3.000" step="0.001" min="0" class="highlight-input">
                    <div class="helper-text">閾値モードで使用。入力したΔから片側αを逆算します。</div>
                </div>
                <div class="input-group">
                    <label for="testType">検定の種類:</label>
                    <select id="testType">
                        <option value="one" selected>片側検定</option>
                        <option value="two">両側検定</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="sampleSizeTreat">治療群 N (予定):</label>
                    <input type="number" id="sampleSizeTreat" value="85">
                </div>
                <div class="input-group">
                    <label for="sampleSizeControl">対照群 N (予定):</label>
                    <input type="number" id="sampleSizeControl" value="85">
                </div>
                <div class="input-group">
                    <label for="deltaInput">平均値の差 (Δ):</label>
                    <input type="number" id="deltaInput" value="5" step="0.01" class="highlight-input">
                </div>
                <div class="input-group">
                    <label for="sdInput">共通 SD:</label>
                    <input type="number" id="sdInput" value="10" step="0.01" min="0.01" class="highlight-input">
                </div>
                <div class="input-group">
                    <label for="dropoutRateTreat">治療群 脱落率 (%):</label>
                    <input type="number" id="dropoutRateTreat" value="1" step="0.1" min="0" max="99">
                </div>
                <div class="input-group">
                    <label for="dropoutRateControl">対照群 脱落率 (%):</label>
                    <input type="number" id="dropoutRateControl" value="1" step="0.1" min="0" max="99">
                </div>
                <div class="input-group">
                    <label for="roundingMethod">脱落後Nの丸め:</label>
                    <select id="roundingMethod">
                        <option value="floor" selected>切り捨て</option>
                        <option value="round">四捨五入</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>図の表示:</label>
                    <div class="checkbox-row">
                        <input type="checkbox" id="showDistributionChart" checked>
                        <span>確率密度関数を表示</span>
                    </div>
                    <div class="checkbox-row">
                        <input type="checkbox" id="showSurvivalChart" checked>
                        <span>1−累積分布関数を表示</span>
                    </div>
                </div>
            </div>
            <button onclick="calculatePower()">🚀 検出力計算</button>
            <button id="downloadPptxButton" class="pptx-btn" onclick="downloadPowerPoint()">PowerPointをダウンロード</button>
        </div>

        <div class="history-area">
            <h2>📊 検出力計算結果（最新）</h2>
            <div id="results">
                <div id="powerResult" class="res-total"></div>
                <div class="chart-container" id="chartContainer">
                    <div class="charts-row" id="chartsRow">
                        <div class="chart-box" id="distributionChartBox">
                            <canvas id="distributionChart" width="300" height="300"></canvas>
                        </div>
                        <div class="chart-box" id="survivalChartBox">
                            <canvas id="survivalChart" width="300" height="300"></canvas>
                        </div>
                    </div>
                    <div class="chart-note" id="chartNote">左：確率密度関数。右：1−累積分布関数。赤い縦線が有意閾値 Δ を示します。</div>
                </div>
            </div>

            <h3 style="margin: 20px 0 8px 0;">📋 計算履歴</h3>
            <button onclick="clearHistory()" class="clear-btn">全履歴をクリア</button>
            <div class="history-table">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>並替</th>
                            <th>治療N</th>
                            <th>対照N</th>
                            <th>脱落率<br>治療/対照</th>
                            <th>Δ</th>
                            <th>有意閾値 Δ</th>
                            <th>SD</th>
                            <th>α</th>
                            <th>検定</th>
                            <th>検出力</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 標準正規分布の累積分布関数 Φ(x)
        // Abramowitz & Stegun 近似。検出力表示には十分な精度。
        function normCDF(x) {
            if (!Number.isFinite(x)) return x < 0 ? 0 : 1;
            const t = 1 / (1 + 0.2316419 * Math.abs(x));
            let d = 0.3989422804014327 * Math.exp(-0.5 * x * x);
            d *= t * (0.319381530 + t * (-0.356563782 + t * (1.781477937 +
                 t * (-1.821255978 + t * 1.330274429))));
            return x >= 0 ? 1 - d : d;
        }

        // 標準正規分布の逆累積分布関数 Φ^-1(p)
        // Peter J. Acklam の有理近似。任意の α に対応するため、固定表ではなく分位点を直接計算する。
        function normPPF(p) {
            if (!(p > 0 && p < 1)) {
                throw new Error('normPPF: p must be between 0 and 1');
            }

            const a = [
                -3.969683028665376e+01,
                 2.209460984245205e+02,
                -2.759285104469687e+02,
                 1.383577518672690e+02,
                -3.066479806614716e+01,
                 2.506628277459239e+00
            ];
            const b = [
                -5.447609879822406e+01,
                 1.615858368580409e+02,
                -1.556989798598866e+02,
                 6.680131188771972e+01,
                -1.328068155288572e+01
            ];
            const c = [
                -7.784894002430293e-03,
                -3.223964580411365e-01,
                -2.400758277161838e+00,
                -2.549732539343734e+00,
                 4.374664141464968e+00,
                 2.938163982698783e+00
            ];
            const d = [
                 7.784695709041462e-03,
                 3.224671290700398e-01,
                 2.445134137142996e+00,
                 3.754408661907416e+00
            ];

            const plow = 0.02425;
            const phigh = 1 - plow;
            let q, r;

            if (p < plow) {
                q = Math.sqrt(-2 * Math.log(p));
                return (((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
                       ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1);
            }
            if (p > phigh) {
                q = Math.sqrt(-2 * Math.log(1 - p));
                return -(((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
                         ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1);
            }

            q = p - 0.5;
            r = q * q;
            return (((((a[0] * r + a[1]) * r + a[2]) * r + a[3]) * r + a[4]) * r + a[5]) * q /
                   (((((b[0] * r + b[1]) * r + b[2]) * r + b[3]) * r + b[4]) * r + 1);
        }

        function getZCritical(alpha, isOneSided) {
            if (!(alpha > 0 && alpha < 1)) {
                throw new Error('有意水準 α は 0 より大きく 1 より小さい値にしてください。');
            }
            const tailProb = isOneSided ? alpha : alpha / 2;
            return normPPF(1 - tailProb);
        }

        function normalPDF(x, mean, sd) {
            return Math.exp(-0.5 * Math.pow((x - mean) / sd, 2)) / (sd * Math.sqrt(2 * Math.PI));
        }

        function buildDistributionData(mean, sd, xMin, xMax, points) {
            const data = [];
            const step = (xMax - xMin) / (points - 1);
            for (let i = 0; i < points; i++) {
                const x = xMin + step * i;
                data.push({ x: x, y: normalPDF(x, mean, sd) });
            }
            return data;
        }

        const verticalLinePlugin = {
            id: 'verticalThresholdLine',
            afterDatasetsDraw(chart, args, pluginOptions) {
                const value = pluginOptions.value;
                if (!Number.isFinite(value)) return;

                const { ctx, chartArea, scales } = chart;
                const x = scales.x.getPixelForValue(value);
                if (x < chartArea.left || x > chartArea.right) return;

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(x, chartArea.top);
                ctx.lineTo(x, chartArea.bottom);
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#d32f2f';
                ctx.setLineDash([6, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = '#d32f2f';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText('有意閾値 Δ', Math.min(x + 6, chartArea.right - 76), chartArea.top + 6);
                ctx.restore();
            }
        };

        Chart.register(verticalLinePlugin);

        function buildSurvivalData(mean, sd, xMin, xMax, points) {
            const data = [];
            const step = (xMax - xMin) / (points - 1);
            for (let i = 0; i < points; i++) {
                const x = xMin + step * i;
                const y = 1 - normCDF((x - mean) / sd);
                data.push({ x: x, y: y });
            }
            return data;
        }

        function updateCharts(se, delta, thresholdDelta) {
            const span = Math.max(Math.abs(delta), Math.abs(thresholdDelta), se) + 4 * se;
            const xMin = Math.min(-span, delta - 4 * se, -thresholdDelta - se);
            const xMax = Math.max(span, delta + 4 * se, thresholdDelta + se);

            updateDistributionChart(se, delta, thresholdDelta, xMin, xMax);
            updateSurvivalChart(se, delta, thresholdDelta, xMin, xMax);
        }

        function updateDistributionChart(se, delta, thresholdDelta, xMin, xMax) {
            const h0Data = buildDistributionData(0, se, xMin, xMax, 220);
            const h1Data = buildDistributionData(delta, se, xMin, xMax, 220);

            const ctx = document.getElementById('distributionChart');
            const config = {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: '帰無仮説 H0',
                            data: h0Data,
                            borderColor: '#ff9800',
                            backgroundColor: 'rgba(255, 152, 0, 0.08)',
                            borderWidth: 2,
                            pointRadius: 0,
                            tension: 0.25
                        },
                        {
                            label: '対立仮説 H1',
                            data: h1Data,
                            borderColor: '#00bcd4',
                            backgroundColor: 'rgba(0, 188, 212, 0.08)',
                            borderWidth: 2,
                            pointRadius: 0,
                            tension: 0.25
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    parsing: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12 } },
                        title: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: x=${context.parsed.x.toFixed(3)}, 密度=${context.parsed.y.toFixed(4)}`;
                                }
                            }
                        },
                        verticalThresholdLine: { value: thresholdDelta }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            title: { display: true, text: '平均値の差' },
                            min: xMin,
                            max: xMax
                        },
                        y: {
                            title: { display: true, text: '密度' },
                            beginAtZero: true
                        }
                    }
                }
            };

            if (distributionChart) {
                distributionChart.destroy();
            }
            distributionChart = new Chart(ctx, config);
        }

        function updateSurvivalChart(se, delta, thresholdDelta, xMin, xMax) {
            const h0Data = buildSurvivalData(0, se, xMin, xMax, 220);
            const h1Data = buildSurvivalData(delta, se, xMin, xMax, 220);

            const ctx = document.getElementById('survivalChart');
            const config = {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: 'H0: αエラー',
                            data: h0Data,
                            borderColor: '#ff9800',
                            backgroundColor: 'rgba(255, 152, 0, 0.08)',
                            borderWidth: 2,
                            pointRadius: 0,
                            tension: 0.25
                        },
                        {
                            label: 'H1: 検出力',
                            data: h1Data,
                            borderColor: '#00bcd4',
                            backgroundColor: 'rgba(0, 188, 212, 0.08)',
                            borderWidth: 2,
                            pointRadius: 0,
                            tension: 0.25
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    parsing: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12 } },
                        title: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: 閾値=${context.parsed.x.toFixed(3)}, 確率=${context.parsed.y.toFixed(4)}`;
                                }
                            }
                        },
                        verticalThresholdLine: { value: thresholdDelta }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            title: { display: true, text: '閾値 Δ' },
                            min: xMin,
                            max: xMax
                        },
                        y: {
                            title: { display: true, text: '1−累積確率' },
                            min: 0,
                            max: 1
                        }
                    }
                }
            };

            if (survivalChart) {
                survivalChart.destroy();
            }
            survivalChart = new Chart(ctx, config);
        }

        let history = [];
        let counter = 0;
        let distributionChart = null;
        let survivalChart = null;

        function calculatePower() {
            let nTreatPlanned = parseFloat(document.getElementById('sampleSizeTreat').value) || 90;
            let nControlPlanned = parseFloat(document.getElementById('sampleSizeControl').value) || 90;
            const delta = parseFloat(document.getElementById('deltaInput').value) || 5.0;
            const sd = parseFloat(document.getElementById('sdInput').value) || 10.0;
            const alphaInput = parseFloat(document.getElementById('alphaInput').value) || 0.05;
            const thresholdInput = parseFloat(document.getElementById('thresholdInput').value);
            const calculationMode = document.getElementById('calculationMode').value;
            const dropoutRateTreat = parseFloat(document.getElementById('dropoutRateTreat').value);
            const dropoutRateControl = parseFloat(document.getElementById('dropoutRateControl').value);
            const rounding = document.getElementById('roundingMethod').value;
            const selectedIsOneSided = document.getElementById('testType').value === 'one';
            const isOneSided = calculationMode === 'threshold' ? true : selectedIsOneSided;

            if (!(dropoutRateTreat >= 0 && dropoutRateTreat < 100)) {
                document.getElementById('powerResult').innerHTML = '<span style="color:#dc3545;">治療群の脱落率は 0%以上 100%未満にしてください。</span>';
                return;
            }
            if (!(dropoutRateControl >= 0 && dropoutRateControl < 100)) {
                document.getElementById('powerResult').innerHTML = '<span style="color:#dc3545;">対照群の脱落率は 0%以上 100%未満にしてください。</span>';
                return;
            }

            const rateTreat = dropoutRateTreat / 100;
            const rateControl = dropoutRateControl / 100;
            let nTreat = rounding === 'round' ? Math.round(nTreatPlanned * (1 - rateTreat)) : Math.floor(nTreatPlanned * (1 - rateTreat));
            let nControl = rounding === 'round' ? Math.round(nControlPlanned * (1 - rateControl)) : Math.floor(nControlPlanned * (1 - rateControl));

            nTreat = Math.max(nTreat, 2);
            nControl = Math.max(nControl, 2);

            if (!(sd > 0)) {
                document.getElementById('powerResult').innerHTML = '<span style="color:#dc3545;">SD は 0 より大きい値にしてください。</span>';
                return;
            }

            const se = Math.sqrt(sd * sd / nTreat + sd * sd / nControl);
            let zAlpha;
            let alpha;
            let oneSidedAlpha;
            let thresholdDelta;
            let alphaDisplay;
            let resultSubText;

            if (calculationMode === 'alpha') {
                if (!(alphaInput > 0 && alphaInput < 1)) {
                    document.getElementById('powerResult').innerHTML = '<span style="color:#dc3545;">α は 0 より大きく 1 より小さい値にしてください。</span>';
                    return;
                }
                alpha = alphaInput;
                zAlpha = getZCritical(alpha, isOneSided);
                thresholdDelta = zAlpha * se;
                oneSidedAlpha = isOneSided ? alpha : alpha / 2;
                alphaDisplay = alpha.toPrecision(4);
                resultSubText = `有意閾値 Δ = ${thresholdDelta.toFixed(3)}`;
            } else {
                if (!(thresholdInput >= 0)) {
                    document.getElementById('powerResult').innerHTML = '<span style="color:#dc3545;">有意閾値 Δ は 0 以上の値にしてください。</span>';
                    return;
                }
                thresholdDelta = thresholdInput;
                zAlpha = thresholdDelta / se;
                oneSidedAlpha = 1 - normCDF(zAlpha);
                alpha = oneSidedAlpha;
                alphaDisplay = oneSidedAlpha.toPrecision(4);
                resultSubText = `逆算α: 片側 ${oneSidedAlpha.toPrecision(4)}`;
            }

            const ncp = delta / se;

            let power;
            if (isOneSided) {
                power = 1 - normCDF(zAlpha - ncp);
            } else {
                power = 1 - normCDF(zAlpha - ncp) + normCDF(-zAlpha - ncp);
            }

            const powerPercent = (power * 100).toFixed(1);

            document.getElementById('powerResult').innerHTML = `
                <strong style="color:#28a745;">${powerPercent}%</strong>
                <div style="font-size:14px; color:#555; margin-top:4px;">${resultSubText}</div>
                <div style="font-size:13px; color:#666; margin-top:4px;">脱落率: 治療群 ${dropoutRateTreat}%、対照群 ${dropoutRateControl}% / 脱落後N: 治療群 ${nTreat}、対照群 ${nControl}</div>
            `;

            updateCharts(se, delta, thresholdDelta);
            updateChartVisibility();

            counter++;
            history.unshift({
                no: counter,
                nTreatPlanned: nTreatPlanned,
                nTreat: nTreat,
                nControlPlanned: nControlPlanned,
                nControl: nControl,
                dropout: `${dropoutRateTreat}% / ${dropoutRateControl}%`,
                delta: delta.toFixed(2),
                thresholdDelta: thresholdDelta.toFixed(3),
                sd: sd.toFixed(2),
                alpha: alphaDisplay,
                test: calculationMode === 'threshold' ? '片側' : (isOneSided ? '片側' : '両側'),
                power: powerPercent
            });

            renderHistory();
        }

        function renderHistory() {
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = '';

            history.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <div class="move-buttons">
                            <button class="move-btn" onclick="moveHistoryItem(${index}, -1)" ${index === 0 ? 'disabled' : ''}>▲</button>
                            <button class="move-btn" onclick="moveHistoryItem(${index}, 1)" ${index === history.length - 1 ? 'disabled' : ''}>▼</button>
                        </div>
                    </td>
                    <td>${item.nTreatPlanned} <small>(${item.nTreat})</small></td>
                    <td>${item.nControlPlanned} <small>(${item.nControl})</small></td>
                    <td>${item.dropout}</td>
                    <td>${item.delta}</td>
                    <td style="font-weight:bold; color:#d32f2f;">${item.thresholdDelta}</td>
                    <td>${item.sd}</td>
                    <td>${item.alpha}</td>
                    <td>${item.test}</td>
                    <td style="font-weight:bold; color:#28a745;">${item.power}%</td>
                    <td><button class="delete-btn" onclick="deleteHistoryItem(${index})">🗑️</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        window.moveHistoryItem = function(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= history.length) return;

            const [movedItem] = history.splice(index, 1);
            history.splice(newIndex, 0, movedItem);
            renderHistory();
        };

        window.deleteHistoryItem = function(index) {
            history.splice(index, 1);
            renderHistory();
        };

        function clearHistory() {
            history = [];
            counter = 0;
            renderHistory();
        }

        function pptText(value) {
            return String(value ?? '').replace(/<[^>]*>/g, '').trim();
        }

        function addPptTitle(slide, title, subtitle) {
            slide.background = { color: 'F7F9FC' };
            slide.addShape('rect', { x: 0, y: 0, w: 13.333, h: 0.18, fill: { color: '1565C0' }, line: { color: '1565C0' } });
            slide.addText(title, { x: 0.55, y: 0.35, w: 12.2, h: 0.48, fontFace: 'Aptos', fontSize: 24, bold: true, color: '263238', margin: 0 });
            if (subtitle) slide.addText(subtitle, { x: 0.57, y: 0.88, w: 12, h: 0.28, fontFace: 'Aptos', fontSize: 9.5, color: '65737E', margin: 0 });
        }

        function getCurrentExportData() {
            if (!history.length) return null;
            const latest = history[0];
            return {
                latest,
                resultText: pptText(document.getElementById('powerResult').innerText),
                mode: document.getElementById('calculationMode').value === 'alpha' ? 'α指定' : '閾値指定',
                rounding: document.getElementById('roundingMethod').selectedOptions[0].text,
                distributionVisible: document.getElementById('showDistributionChart').checked,
                survivalVisible: document.getElementById('showSurvivalChart').checked
            };
        }

        async function downloadPowerPoint() {
            const button = document.getElementById('downloadPptxButton');
            if (typeof PptxGenJS === 'undefined') {
                alert('PowerPoint生成ライブラリを読み込めませんでした。インターネット接続を確認して再読み込みしてください。');
                return;
            }
            const data = getCurrentExportData();
            if (!data) {
                alert('先に「検出力計算」を実行してください。');
                return;
            }

            button.disabled = true;
            button.textContent = 'PowerPointを作成中…';
            try {
                const pptx = new PptxGenJS();
                pptx.layout = 'LAYOUT_WIDE';
                pptx.author = '臨床試験 2群平均差 検出力計算';
                pptx.subject = '検出力計算結果';
                pptx.title = '臨床試験 2群平均差 検出力計算結果';
                pptx.company = '';
                pptx.lang = 'ja-JP';
                pptx.theme = {
                    headFontFace: 'Aptos', bodyFontFace: 'Aptos', lang: 'ja-JP'
                };

                const slide = pptx.addSlide();
                addPptTitle(slide, '2群平均差 検出力計算結果', `出力日時: ${new Date().toLocaleString('ja-JP')}`);
                slide.addShape('roundRect', { x: 0.55, y: 1.25, w: 3.30, h: 0.86, rectRadius: 0.05, fill: { color: 'E3F2FD' }, line: { color: '90CAF9', width: 1 } });
                slide.addText('検出力', { x: 0.75, y: 1.42, w: 0.85, h: 0.25, fontFace: 'Aptos', fontSize: 12, bold: true, color: '34536F', margin: 0 });
                slide.addText(`${data.latest.power}%`, { x: 1.63, y: 1.34, w: 1.75, h: 0.48, fontFace: 'Aptos', fontSize: 27, bold: true, color: '1565C0', margin: 0, align: 'right' });

                const summaryRows = [
                    [{ text: '項目', options: { bold: true, color: 'FFFFFF', fill: '1565C0' } }, { text: '入力・算出値', options: { bold: true, color: 'FFFFFF', fill: '1565C0' } }],
                    ['入力モード', data.mode],
                    ['予定N (治/対)', `${data.latest.nTreatPlanned} / ${data.latest.nControlPlanned}`],
                    ['脱落後N (治/対)', `${data.latest.nTreat} / ${data.latest.nControl}`],
                    ['脱落率 (治/対)', data.latest.dropout],
                    ['平均差Δ/共通SD', `${data.latest.delta} / ${data.latest.sd}`],
                    ['有意閾値 Δ', data.latest.thresholdDelta],
                    ['α / 検定', `${data.latest.alpha} / ${data.latest.test}`],
                    ['脱落後Nの丸め', data.rounding]
                ];
                slide.addTable(summaryRows, {
                    x: 0.55, y: 2.28, w: 3.30, h: 4.42,
                    border: { type: 'solid', color: 'B8C7D9', pt: 0.65 },
                    fill: 'FFFFFF', color: '263238', fontFace: 'Aptos', fontSize: 11.0,
                    margin: 0.045, rowH: 0.46, valign: 'middle',
                    columnW: [1.50, 1.80],
                    autoFit: false,
                    bold: false
                });

                const chartImages = [];
                if (data.distributionVisible && distributionChart) chartImages.push({ title: '確率密度関数', image: distributionChart.toBase64Image() });
                if (data.survivalVisible && survivalChart) chartImages.push({ title: '1−累積分布関数', image: survivalChart.toBase64Image() });
                if (chartImages.length === 2) {
                    chartImages.forEach((chart, i) => {
                        const x = 4.08 + i * 4.55;
                        slide.addText(chart.title, { x, y: 1.36, w: 4.25, h: 0.3, align: 'center', fontFace: 'Aptos', fontSize: 13, bold: true, color: '264F73', margin: 0 });
                        slide.addImage({ data: chart.image, x, y: 1.78, w: 4.25, h: 4.25 });
                    });
                } else if (chartImages.length === 1) {
                    slide.addText(chartImages[0].title, { x: 6.18, y: 1.36, w: 4.8, h: 0.3, align: 'center', fontFace: 'Aptos', fontSize: 13, bold: true, color: '264F73', margin: 0 });
                    slide.addImage({ data: chartImages[0].image, x: 6.45, y: 1.78, w: 4.25, h: 4.25 });
                } else {
                    slide.addText('図は画面設定で非表示のため、出力対象外です。', { x: 5.0, y: 3.6, w: 7, h: 0.4, align: 'center', fontFace: 'Aptos', fontSize: 12, color: '6C757D', margin: 0 });
                }

                const rowsPerSlide = 14;
                for (let start = 0; start < history.length; start += rowsPerSlide) {
                    const part = history.slice(start, start + rowsPerSlide);
                    const historySlide = pptx.addSlide();
                    addPptTitle(historySlide, '計算履歴', `${start + 1}–${start + part.length}件目 / 全${history.length}件`);
                    const rows = [[
                        { text: '治療N (予定/後)', options: { bold: true, color: 'FFFFFF', fill: '1565C0' } },
                        { text: '対照N (予定/後)', options: { bold: true, color: 'FFFFFF', fill: '1565C0' } },
                        { text: '脱落率 (治/対)', options: { bold: true, color: 'FFFFFF', fill: '1565C0' } },
                        { text: '平均差Δ', options: { bold: true, color: 'FFFFFF', fill: '1565C0' } },
                        { text: '有意閾値Δ', options: { bold: true, color: 'FFFFFF', fill: '1565C0' } },
                        { text: 'SD', options: { bold: true, color: 'FFFFFF', fill: '1565C0' } },
                        { text: 'α', options: { bold: true, color: 'FFFFFF', fill: '1565C0' } },
                        { text: '検定', options: { bold: true, color: 'FFFFFF', fill: '1565C0' } },
                        { text: '検出力', options: { bold: true, color: 'FFFFFF', fill: '1565C0' } }
                    ]];
                    part.forEach(item => rows.push([
                        `${item.nTreatPlanned} (${item.nTreat})`, `${item.nControlPlanned} (${item.nControl})`,
                        item.dropout, item.delta, item.thresholdDelta, item.sd, item.alpha, item.test, `${item.power}%`
                    ]));
                    historySlide.addTable(rows, {
                        x: 0.42, y: 1.33, w: 12.48, h: 5.72,
                        border: { type: 'solid', color: 'CED4DA', pt: 0.55 },
                        fill: 'FFFFFF', color: '263238', fontFace: 'Aptos', fontSize: 11.0,
                        margin: 0.045, rowH: 0.37, valign: 'middle', align: 'center',
                        columnW: [1.70, 1.70, 2.00, 1.35, 1.50, 0.90, 1.10, 1.00, 1.23],
                        autoFit: false
                    });
                }

                const stamp = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                await pptx.writeFile({ fileName: `normal_power_results_${stamp}.pptx`, compression: true });
            } catch (error) {
                console.error(error);
                alert(`PowerPointの作成に失敗しました: ${error.message || error}`);
            } finally {
                button.disabled = false;
                button.textContent = 'PowerPointをダウンロード';
            }
        }


        function updateChartVisibility() {
            const showDistribution = document.getElementById('showDistributionChart').checked;
            const showSurvival = document.getElementById('showSurvivalChart').checked;
            const chartContainer = document.getElementById('chartContainer');
            const distributionBox = document.getElementById('distributionChartBox');
            const survivalBox = document.getElementById('survivalChartBox');
            const chartNote = document.getElementById('chartNote');

            distributionBox.classList.toggle('hidden-chart', !showDistribution);
            survivalBox.classList.toggle('hidden-chart', !showSurvival);
            chartContainer.classList.toggle('hidden-chart-container', !showDistribution && !showSurvival);

            if (showDistribution && showSurvival) {
                chartNote.textContent = '左：確率密度関数。右：1−累積分布関数。赤い縦線が有意閾値 Δ を示します。';
            } else if (showDistribution) {
                chartNote.textContent = '確率密度関数。赤い縦線が有意閾値 Δ を示します。';
            } else if (showSurvival) {
                chartNote.textContent = '1−累積分布関数。赤い縦線が有意閾値 Δ を示します。';
            }

            if (distributionChart) distributionChart.resize();
            if (survivalChart) survivalChart.resize();
        }

        function updateInputMode() {
            const mode = document.getElementById('calculationMode').value;
            const alphaInput = document.getElementById('alphaInput');
            const thresholdInput = document.getElementById('thresholdInput');
            const testType = document.getElementById('testType');
            if (mode === 'alpha') {
                alphaInput.disabled = false;
                thresholdInput.disabled = true;
                alphaInput.classList.remove('disabled-input');
                thresholdInput.classList.add('disabled-input');
                testType.disabled = false;
                testType.classList.remove('disabled-input');
            } else {
                alphaInput.disabled = true;
                thresholdInput.disabled = false;
                alphaInput.classList.add('disabled-input');
                thresholdInput.classList.remove('disabled-input');
                testType.value = 'one';
                testType.disabled = true;
                testType.classList.add('disabled-input');
            }
        }

        document.getElementById('calculationMode').addEventListener('change', updateInputMode);
        document.getElementById('showDistributionChart').addEventListener('change', updateChartVisibility);
        document.getElementById('showSurvivalChart').addEventListener('change', updateChartVisibility);

        window.onload = function() {
            updateInputMode();
            calculatePower();
            updateChartVisibility();
        };
    </script>
</body>
</html>
