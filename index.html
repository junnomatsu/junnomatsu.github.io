<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テストページ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f0f0f0;
        }
        h1 {
            color: #333;
        }
        p {
            color: #666;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>✅ テストページ</h1>
    <p>このページが正常に表示されればアップロード成功です！</p>
    <p>現在の日時: <span id="datetime"></span></p>

    <script>
        // 現在の日時を表示
        document.getElementById('datetime').textContent = new Date().toLocaleString('ja-JP');
    </script>
</body>
</html>
