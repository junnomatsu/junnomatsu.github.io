<body>
    <a class="top-link" href="index.html">トップページへ</a>
    <h1>臨床試験 2群奏功割合 検出力計算</h1>
    <hr>

    <div class="main-container">
        <div class="input-area">
            <div class="inputs-container">
                <div class="input-group">
                    <label for="calculationMode">入力モード:</label>
                    <select id="calculationMode">
                        <option value="alpha" selected>αから閾値を計算</option>
                        <option value="threshold">閾値からαを逆算</option>
                    </select>
                </div>
                <div class="input-group" id="alphaInputGroup">
                    <label for="alphaInput">有意水準 (α):</label>
                    <input type="number" id="alphaInput" value="0.025" step="0.001" min="0.001" max="0.5">
                    <div class="helper-text">αモードで使用。p値は割合で入力します。例: 0.025</div>
                </div>
                <div class="input-group" id="thresholdRiskDifferenceGroup">
                    <label for="thresholdRiskDifference">有意閾値 リスク差 (%):</label>
                    <input type="number" id="thresholdRiskDifference" value="15" step="0.1" min="-100" max="100" class="highlight-input">
                    <div class="helper-text">閾値モードで使用。治療群－対照群の奏功割合差（percentage point）を入力します。</div>
                </div>
                <div class="input-group">
                    <label for="testSide">検定の種類:</label>
                    <select id="testSide">
                        <option value="one" selected>片側検定（治療群 &gt; 対照群）</option>
                        <option value="two">両側検定</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="testMethod">検定方法:</label>
                    <select id="testMethod">
                        <option value="chisq" selected>カイ二乗検定（連続補正無し）</option>
                        <option value="yates">カイ二乗検定（連続補正有り）</option>
                        <option value="fisher">フィッシャー検定</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="sampleSizeTreat">治療群 N (予定):</label>
                    <input type="number" id="sampleSizeTreat" value="85" min="1">
                </div>
                <div class="input-group">
                    <label for="sampleSizeControl">対照群 N (予定):</label>
                    <input type="number" id="sampleSizeControl" value="85" min="1">
                </div>
                <div class="input-group">
                    <label for="rateTreat">治療群 奏功割合 (%):</label>

                </div>
                <div class="input-group">
                    <label for="rateControl">対照群 奏功割合 (%):</label>
                    <input type="number" id="rateControl" value="25" step="0.1" min="0" max="100" class="highlight-input">
                    <div class="helper-text">閾値の症例数換算では、対照群の観測奏功例数（入力割合を丸めた値）を基準にします。</div>
                </div>
                <div class="input-group">

                    <input type="number" id="dropoutRate" value="1" min="0" max="99">

                    <label for="roundingMethod">脱落後Nの丸め:</label>

                        <option value="round">四捨五入</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>図の表示:</label>
                    <div class="checkbox-row"><input type="checkbox" id="showPvalueChart" checked><span>分布図を表示</span></div>
                    <div class="checkbox-row"><input type="checkbox" id="showPowerCurveChart" checked><span>p値・検出力曲線を表示</span></div>
                </div>
            </div>
            <button onclick="calculatePower()">🚀 検出力計算</button>
        </div>

        <div class="history-area">
            <h2>📊 検出力計算結果（最新）</h2>

                <div id="powerResult" class="res-total"></div>
                <div id="detailResult"></div>
                <div class="chart-container" id="chartContainer">
                    <div class="charts-row">
                        <div class="chart-box" id="pvalueChartBox"><canvas id="pvalueChart" width="300" height="300"></canvas></div>
                        <div class="chart-box" id="powerCurveChartBox"><canvas id="powerCurveChart" width="300" height="300"></canvas></div>
                    </div>
                    <div class="chart-note" id="chartNote">左：H0/H1の群間リスク差分布。右：有意閾値リスク差ごとのαエラーと検出力。赤い縦線が有意閾値リスク差を示します。</div>
                </div>

            <h3 style="margin: 20px 0 8px 0;">📋 計算履歴</h3>
            <button onclick="clearHistory()" class="clear-btn">全履歴をクリア</button>
            <div class="history-table">
                <table id="historyTable">
                    <thead><tr>
                        <th>並替</th><th>モード</th><th>治療N</th><th>対照N</th><th>脱落率</th><th>治療%</th><th>対照%</th><th>閾値 リスク差%</th><th>閾値例数</th><th>α</th><th>検定</th><th>閾値p値</th><th>検出力</th><th>操作</th>
                    </tr></thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>

<script>
function erf(x) {
    const sign = x >= 0 ? 1 : -1;
    x = Math.abs(x);
    const a1=0.254829592, a2=-0.284496736, a3=1.421413741, a4=-1.453152027, a5=1.061405429, p=0.3275911;
    const t = 1/(1+p*x);
    const y = 1 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
    return sign*y;
}
function chiSq1Pvalue(x) { return x <= 0 ? 1 : Math.max(0, Math.min(1, 1 - erf(Math.sqrt(x/2)))); }
function clampRate(x) { return Math.max(0, Math.min(1, x)); }
function safeNum(id, def) { const v = parseFloat(document.getElementById(id).value); return Number.isFinite(v) ? v : def; }

const logFactCache = [0];
function logFact(n) { for (let i=logFactCache.length; i<=n; i++) logFactCache[i] = logFactCache[i-1] + Math.log(i); return logFactCache[n]; }
function logChoose(n,k) { if (k<0 || k>n) return -Infinity; return logFact(n)-logFact(k)-logFact(n-k); }
function hypergeomProb(a, r1, c1, n) { return Math.exp(logChoose(c1,a) + logChoose(n-c1, r1-a) - logChoose(n,r1)); }
function fisherPvalue(a,b,c,d, side) {
    const r1=a+b, r2=c+d, c1=a+c, n=r1+r2;
    const minA = Math.max(0, r1-(n-c1)), maxA = Math.min(r1,c1);
    const obs = hypergeomProb(a,r1,c1,n);
    let p = 0;
    if (side === 'one') {
        for (let x=a; x<=maxA; x++) p += hypergeomProb(x,r1,c1,n); // 治療群が良い方向
    } else {
        for (let x=minA; x<=maxA; x++) {
            const pr = hypergeomProb(x,r1,c1,n);
            if (pr <= obs + 1e-12) p += pr;
        }
    }
    return Math.min(1, p);
}
function chiSquareStat(a,b,c,d,yates) {
    const n=a+b+c+d;
    const r1=a+b, r2=c+d, c1=a+c, c2=b+d;
    const denom = r1*r2*c1*c2;
    if (denom <= 0) return 0;
    let diff = Math.abs(a*d - b*c);
    if (yates) diff = Math.max(0, diff - n/2);
    return n * diff * diff / denom;
}
function testPvalue(xT,nT,xC,nC,method,side) {
    const a=xT, b=nT-xT, c=xC, d=nC-xC;
    if (method === 'fisher') return fisherPvalue(a,b,c,d,side);
    const stat = chiSquareStat(a,b,c,d,method === 'yates');
    const pTwo = chiSq1Pvalue(stat);
    if (side === 'two') return pTwo;
    const dir = (xT/nT) >= (xC/nC) ? 1 : -1;
    return dir > 0 ? Math.min(1, pTwo/2) : 1 - Math.min(1, pTwo/2);
}
function binomProbs(n,p) {
    p = clampRate(p);
    const probs = new Array(n+1).fill(0);
    if (p === 0) { probs[0]=1; return probs; }
    if (p === 1) { probs[n]=1; return probs; }
    for (let k=0;k<=n;k++) probs[k] = Math.exp(logChoose(n,k)+k*Math.log(p)+(n-k)*Math.log(1-p));
    return probs;
}
function exactPower(nT,nC,pT,pC,alpha,method,side) {
    const bt=binomProbs(nT,pT), bc=binomProbs(nC,pC);
    let pow=0;
    for (let xT=0;xT<=nT;xT++) {
        for (let xC=0;xC<=nC;xC++) {
            const pv = testPvalue(xT,nT,xC,nC,method,side);
            if (pv <= alpha) pow += bt[xT]*bc[xC];
        }
    }
    return pow;
}
function exactProbabilityByRiskDifference(nT,nC,pT,pC,thresholdRiskDiff) {
    const bt=binomProbs(nT,pT), bc=binomProbs(nC,pC);
    let probability=0;
    for (let xT=0;xT<=nT;xT++) {
        for (let xC=0;xC<=nC;xC++) {
            const observedRiskDiff = xT/nT - xC/nC;
            if (observedRiskDiff + 1e-12 >= thresholdRiskDiff) probability += bt[xT]*bc[xC];
        }
    }
    return probability;
}
function findThreshold(nT,nC,pC,alpha,method,side) {
    const xC = Math.round(nC*pC);
    for (let xT=0; xT<=nT; xT++) {
        const rateT = xT/nT;
        if (rateT + 1e-12 < xC/nC) continue;
        const pv = testPvalue(xT,nT,xC,nC,method,side);
        if (pv <= alpha) return {xT, xC, rateT, rateCobs:xC/nC, pvalue:pv};
    }
    return null;
}
function methodLabel(m) { return m==='chisq'?'χ²補正無':m==='yates'?'χ²補正有':'Fisher'; }
function sideLabel(s) { return s==='one'?'片側':'両側'; }

const verticalLinePlugin = {
    id: 'verticalThresholdLine',
    afterDatasetsDraw(chart, args, opts) {
        if (!opts || !Number.isFinite(opts.value)) return;
        const {ctx, chartArea, scales} = chart;
        const x = scales.x.getPixelForValue(opts.value);
        if (x < chartArea.left || x > chartArea.right) return;
        ctx.save(); ctx.beginPath(); ctx.moveTo(x, chartArea.top); ctx.lineTo(x, chartArea.bottom);
        ctx.lineWidth=2; ctx.strokeStyle='#d32f2f'; ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle='#d32f2f'; ctx.font='bold 12px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText('有意閾値 リスク差', Math.min(x+6, chartArea.right-115), chartArea.top+6); ctx.restore();
    }
};
Chart.register(verticalLinePlugin);
let history = [], counter = 0, pvalueChart = null, powerCurveChart = null;

function buildRiskDifferenceDistributionData(nT,nC,pT,pC) {
    const bt = binomProbs(nT, pT);
    const bc = binomProbs(nC, pC);
    const map = new Map();
    for (let xT = 0; xT <= nT; xT++) {
        for (let xC = 0; xC <= nC; xC++) {
            const riskDiff = (xT / nT - xC / nC) * 100;
            const key = riskDiff.toFixed(6);
            map.set(key, (map.get(key) || 0) + bt[xT] * bc[xC] * 100);
        }
    }
    return Array.from(map.entries())
        .map(([x, y]) => ({ x: Number(x), y }))
        .sort((a, b) => a.x - b.x);
}
function buildThresholdCurveData(nT,nC,pT,pC,method,side,kind,calculationMode) {
    const data=[];
    const xCFixed = Math.round(nC * pC);
    const fixedControlRate = xCFixed / nC;
    for (let xThreshold=0; xThreshold<=nT; xThreshold++) {
        const thresholdRiskDiff = xThreshold/nT - fixedControlRate;
        let y;
        if (kind === 'alpha') {
            if (calculationMode === 'threshold') {
                // H0（両群とも対照群奏功割合）で、観測リスク差が閾値以上となる確率。
                y = exactProbabilityByRiskDifference(nT,nC,pC,pC,thresholdRiskDiff);
            } else {
                y = testPvalue(xThreshold,nT,xCFixed,nC,method,side);
            }
        } else {
            if (calculationMode === 'threshold') {
                // 設定されたリスク差そのものを判定基準として検出力を計算する。
                y = exactProbabilityByRiskDifference(nT,nC,pT,pC,thresholdRiskDiff);
            } else {
                const thresholdPvalue = testPvalue(xThreshold,nT,xCFixed,nC,method,side);
                y = exactPower(nT,nC,pT,pC,thresholdPvalue,method,side);
            }
        }
        data.push({x:thresholdRiskDiff*100, y:y*100});
    }
    return data;
}
function updateCharts(nT,nC,pC,alpha,method,side,thresholdRiskDiff,pT,calculationMode) {
    const h0Data = buildRiskDifferenceDistributionData(nT, nC, pC, pC);
    const h1Data = buildRiskDifferenceDistributionData(nT, nC, pT, pC);
    const alphaData = buildThresholdCurveData(nT,nC,pT,pC,method,side,'alpha',calculationMode)
        .filter(d => d.x >= -1e-9);
    const powData = buildThresholdCurveData(nT,nC,pT,pC,method,side,'power',calculationMode)
        .filter(d => d.x >= -1e-9);
    const thresholdPct = thresholdRiskDiff == null ? NaN : thresholdRiskDiff * 100;
    const orange = '#ff9800';
    const lightBlue = '#00bcd4';

    const leftCommon = {
        responsive:true,
        maintainAspectRatio:false,
        parsing:false,
        plugins:{ legend:{position:'bottom', labels:{boxWidth:12}}, verticalThresholdLine:{value:thresholdPct}},
        scales:{ x:{type:'linear', title:{display:true,text:'群間リスク差 (%)'}, min:-100, max:100} }
    };

    const rightCommon = {
        responsive:true,
        maintainAspectRatio:false,
        parsing:false,
        plugins:{ legend:{position:'bottom', labels:{boxWidth:12}}, verticalThresholdLine:{value:thresholdPct}},
        scales:{ x:{type:'linear', title:{display:true,text:'群間リスク差 (%)'}, min:0, max:100} }
    };

    const ctx1=document.getElementById('pvalueChart');
    if (pvalueChart) pvalueChart.destroy();
    pvalueChart=new Chart(ctx1,{
        type:'line',
        data:{datasets:[
            {label:'H0: リスク差分布',data:h0Data,borderColor:orange,backgroundColor:'rgba(255,152,0,0.08)',borderWidth:2,pointRadius:0,tension:0.15},
            {label:'H1: リスク差分布',data:h1Data,borderColor:lightBlue,backgroundColor:'rgba(0,188,212,0.08)',borderWidth:2,pointRadius:0,tension:0.15}
        ]},
        options:{...leftCommon,plugins:{...leftCommon.plugins,tooltip:{callbacks:{label:(c)=>`${c.dataset.label}: ${c.parsed.y.toFixed(2)}%`}},verticalThresholdLine:{value:thresholdPct}},scales:{...leftCommon.scales,y:{title:{display:true,text:'密度 (%)'},min:0}}}
    });

    const ctx2=document.getElementById('powerCurveChart');
    if (powerCurveChart) powerCurveChart.destroy();
    powerCurveChart=new Chart(ctx2,{
        type:'line',
        data:{datasets:[
            {label:'αエラー (%)',data:alphaData,borderColor:orange,backgroundColor:'rgba(255,152,0,0.08)',borderWidth:2,pointRadius:0,tension:0.2},
            {label:'検出力 (%)',data:powData,borderColor:lightBlue,backgroundColor:'rgba(0,188,212,0.08)',borderWidth:2,pointRadius:0,tension:0.2}
        ]},
        options:{...rightCommon,plugins:{...rightCommon.plugins,tooltip:{callbacks:{label:(c)=>`${c.dataset.label}: ${c.parsed.y.toFixed(3)}%`}},verticalThresholdLine:{value:thresholdPct}},scales:{...rightCommon.scales,y:{title:{display:true,text:'確率 (%)'},min:0,max:100}}}
    });
}
function updateChartVisibility() {
    const s1=document.getElementById('showPvalueChart').checked, s2=document.getElementById('showPowerCurveChart').checked;
    document.getElementById('pvalueChartBox').classList.toggle('hidden-chart',!s1);
    document.getElementById('powerCurveChartBox').classList.toggle('hidden-chart',!s2);
    document.getElementById('chartContainer').classList.toggle('hidden-chart-container',!s1&&!s2);
    document.getElementById('chartNote').textContent = s1&&s2 ? '左：H0/H1の群間リスク差分布。右：有意閾値リスク差ごとのαエラーと検出力。赤い縦線が有意閾値リスク差を示します。' : (s1 ? 'H0/H1の群間リスク差分布。赤い縦線が有意閾値リスク差を示します。' : '有意閾値リスク差を動かしたαエラーと検出力。検出力は計算結果と同じ判定ロジックで再計算します。');
    if (pvalueChart) pvalueChart.resize(); if (powerCurveChart) powerCurveChart.resize();
}
function calculatePower() {
    const calculationMode=document.getElementById('calculationMode').value;
    let alpha=safeNum('alphaInput',0.025), method=document.getElementById('testMethod').value, side=document.getElementById('testSide').value;
    let nTP=safeNum('sampleSizeTreat',85), nCP=safeNum('sampleSizeControl',85);
    const pT=clampRate(safeNum('rateTreat',45)/100), pC=clampRate(safeNum('rateControl',25)/100);
    const thresholdRiskDiffInput=safeNum('thresholdRiskDifference',15)/100;
    const dropout=safeNum('dropoutRate',0), rounding=document.getElementById('roundingMethod').value;
    const rate=dropout/100;
    let nT=rounding==='round'?Math.round(nTP*(1-rate)):Math.floor(nTP*(1-rate));
    let nC=rounding==='round'?Math.round(nCP*(1-rate)):Math.floor(nCP*(1-rate));
    nT=Math.max(nT,1); nC=Math.max(nC,1);
    const xT=Math.round(nT*pT), xC=Math.round(nC*pC);
    const obsPT=xT/nT, obsPC=xC/nC, diff=obsPT-obsPC;

    let th=null, thresholdRiskDiffForChart=null, resultModeText='';
    if (calculationMode === 'alpha') {
        if (!(alpha>0 && alpha<1)) { document.getElementById('powerResult').innerHTML='<span style="color:#dc3545;">α は 0 より大きく 1 より小さい値にしてください。</span>'; return; }
        th=findThreshold(nT,nC,pC,alpha,method,side);
        if (th) th.riskDiff = th.rateT - th.rateCobs;
        thresholdRiskDiffForChart=th?th.riskDiff:null;
        resultModeText='αから閾値を計算';
    } else {
        if (!(thresholdRiskDiffInput >= -1 && thresholdRiskDiffInput <= 1)) {
            document.getElementById('powerResult').innerHTML='<span style="color:#dc3545;">有意閾値リスク差は -100% 以上 100% 以下で入力してください。</span>';
            return;
        }
        // 入力されたリスク差以上となる最小の治療群奏功例数を採用する。
        // 対照群は入力奏功割合から丸めた観測例数 xC に固定する。
        const targetTreatRate=obsPC + thresholdRiskDiffInput;
        const xThreshold=Math.ceil((targetTreatRate*nT)-1e-12);
        if (xThreshold < 0 || xThreshold > nT) {
            document.getElementById('powerResult').innerHTML='<span style="color:#dc3545;">この対照群奏功割合とリスク差の組合せでは、実現可能な治療群奏功割合（0～100%）を超えます。</span>';
            return;
        }
        const obsThreshold=xThreshold/nT;
        const realizedRiskDiff=obsThreshold-obsPC;
        alpha=testPvalue(xThreshold,nT,xC,nC,method,side);
        if (!(alpha>0 && alpha<=1)) { document.getElementById('powerResult').innerHTML='<span style="color:#dc3545;">閾値からαを逆算できませんでした。</span>'; return; }
        th={xT:xThreshold, xC:xC, rateT:obsThreshold, rateCobs:obsPC, riskDiff:realizedRiskDiff, requestedRiskDiff:thresholdRiskDiffInput, pvalue:alpha};
        thresholdRiskDiffForChart=thresholdRiskDiffInput;
        resultModeText='リスク差閾値からαを逆算';
    }

    const pv=testPvalue(xT,nT,xC,nC,method,side);
    const pow = calculationMode === 'threshold'
        ? exactProbabilityByRiskDifference(nT,nC,pT,pC,thresholdRiskDiffInput)
        : exactPower(nT,nC,pT,pC,alpha,method,side);
    const thText=th?`${(th.riskDiff*100).toFixed(1)}%（治療群 ${th.xT}/${nT} = ${(th.rateT*100).toFixed(1)}%、対照群 ${th.xC}/${nC} = ${(th.rateCobs*100).toFixed(1)}%、閾値p=${th.pvalue.toPrecision(4)}）`:'実現可能範囲内に有意閾値なし';
    const alphaText=alpha.toPrecision(4);
    document.getElementById('powerResult').innerHTML = `<strong style="color:#28a745;">${(pow*100).toFixed(1)}%</strong><div class="sub-result">${resultModeText} / α = ${alphaText} / 有意閾値 リスク差 = ${calculationMode === 'threshold' ? (thresholdRiskDiffInput*100).toFixed(1) + '%' : thText}</div>`;
    const roundingNote = calculationMode === 'threshold' && th ? `α逆算時のみ、対照群を ${th.xC}/${nC} に固定し、入力リスク差以上となる最小の治療群奏功例数 ${th.xT}/${nT}（離散的リスク差 ${(th.riskDiff*100).toFixed(1)}%）でp値を求めました。実際の検出力は、各組合せの観測リスク差が入力値 ${(thresholdRiskDiffInput*100).toFixed(1)}% 以上かどうかで直接判定しています。` : '';
    document.getElementById('detailResult').innerHTML = `<div class="small-note">入力奏功割合から症例数に丸めた観測値: 治療群 ${xT}/${nT} = ${(obsPT*100).toFixed(1)}%、対照群 ${xC}/${nC} = ${(obsPC*100).toFixed(1)}%、リスク差 = ${(diff*100).toFixed(1)}%。${roundingNote} 閾値モードでは、対照群の観測奏功例数を固定するのはα逆算時だけです。検出力とαエラーは、治療群・対照群の全症例数組合せについて観測リスク差が設定値以上となる確率を直接合計します。p値とαは%ではなく単位なしです。グラフ上のみαエラーと検出力を%表示しています。</div>`;
    updateCharts(nT,nC,pC,alpha,method,side,thresholdRiskDiffForChart,pT,calculationMode); updateChartVisibility();
    counter++; history.unshift({mode:calculationMode==='alpha'?'α→閾値':'閾値→α',nTP,nT,nCP,nC,dropout,treat:(pT*100).toFixed(1),control:(pC*100).toFixed(1),threshold:th?(calculationMode==='threshold'?(thresholdRiskDiffInput*100).toFixed(1):(th.riskDiff*100).toFixed(1)):'なし',thresholdCount:th?`${th.xT}/${nT}`:'-',alpha:alphaText,test:`${methodLabel(method)}・${sideLabel(side)}`,pvalue:th?th.pvalue.toPrecision(4):'-',power:(pow*100).toFixed(1)});
    renderHistory();
}
function renderHistory() {
    const tbody=document.getElementById('historyBody'); tbody.innerHTML='';
    history.forEach((it,index)=>{ const row=document.createElement('tr'); row.innerHTML=`<td><div class="move-buttons"><button class="move-btn" onclick="moveHistoryItem(${index},-1)" ${index===0?'disabled':''}>▲</button><button class="move-btn" onclick="moveHistoryItem(${index},1)" ${index===history.length-1?'disabled':''}>▼</button></div></td><td>${it.mode}</td><td>${it.nTP} <small>(${it.nT})</small></td><td>${it.nCP} <small>(${it.nC})</small></td><td>${it.dropout}%</td><td>${it.treat}</td><td>${it.control}</td><td style="font-weight:bold;color:#d32f2f;">${it.threshold}</td><td>${it.thresholdCount}</td><td>${it.alpha}</td><td>${it.test}</td><td>${it.pvalue}</td><td style="font-weight:bold;color:#28a745;">${it.power}%</td><td><button class="delete-btn" onclick="deleteHistoryItem(${index})">🗑️</button></td>`; tbody.appendChild(row); });
}
window.moveHistoryItem=function(index,direction){ const ni=index+direction; if(ni<0||ni>=history.length)return; const [m]=history.splice(index,1); history.splice(ni,0,m); renderHistory(); };
window.deleteHistoryItem=function(index){ history.splice(index,1); renderHistory(); };
function clearHistory(){ history=[]; counter=0; renderHistory(); }
function updateInputMode() {
    const mode=document.getElementById('calculationMode').value;
    const alphaGroup=document.getElementById('alphaInputGroup');
    const thresholdGroup=document.getElementById('thresholdRiskDifferenceGroup');
    alphaGroup.style.display = mode === 'alpha' ? '' : 'none';
    thresholdGroup.style.display = mode === 'threshold' ? '' : 'none';
}
document.getElementById('calculationMode').addEventListener('change', updateInputMode);
document.getElementById('showPvalueChart').addEventListener('change', updateChartVisibility);
document.getElementById('showPowerCurveChart').addEventListener('change', updateChartVisibility);
window.onload=function(){ updateInputMode(); calculatePower(); updateChartVisibility(); };
</script>
</body>
