    <script>
        let xorSeed = 123456789;
        function xorshiftRandom() {
            xorSeed ^= xorSeed << 13; xorSeed ^= xorSeed >>> 17; xorSeed ^= xorSeed << 5;
            return (xorSeed >>> 0) / 4294967296;
        }
        function normalRandom(mean = 0, sd = 1) {
            let u = 0, v = 0;
            while (u === 0) u = xorshiftRandom();
            while (v === 0) v = xorshiftRandom();
            let z = Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
            return mean + z * sd;
        }

        function toggleSection(section) {
            const checked = document.getElementById('toggle' + section.charAt(0).toUpperCase() + section.slice(1)).checked;
            if (section === 'basic') {
                document.getElementById('basicTitle').style.display = checked ? 'block' : 'none';
                document.getElementById('basicResults').style.display = checked ? 'block' : 'none';
                return;
            }
            if (section === 'matrix') {
                document.getElementById('effectMatrixTitle').style.display = checked ? 'block' : 'none';
                document.getElementById('matrixContainer').style.display = checked ? 'block' : 'none';
                document.getElementById('nullMatrixTitle').style.display = checked ? 'block' : 'none';
                document.getElementById('matrixContainerNull').style.display = checked ? 'block' : 'none';
            }
            if (section === 'treeOverview') {
                ['effectTreeOverviewTitle', 'treeOverviewContainer', 'nullTreeOverviewTitle', 'treeOverviewContainerNull']
                    .forEach(id => document.getElementById(id).style.display = checked ? 'block' : 'none');
            }
            if (section === 'treeDetail') {
                ['effectTreeDetailTitle', 'treeDetailContainer', 'nullTreeDetailTitle', 'treeDetailContainerNull']
                    .forEach(id => document.getElementById(id).style.display = checked ? 'block' : 'none');
            }
            const hasDetails = document.getElementById('toggleMatrix').checked ||
                document.getElementById('toggleTreeOverview').checked ||
                document.getElementById('toggleTreeDetail').checked;
            document.getElementById('nullDetails').style.display = hasDetails ? 'block' : 'none';
            document.getElementById('nullTitle').style.display = hasDetails ? 'block' : 'none';
        }

        function addSlideFrame(pptx, slide, title) {
            slide.background = { color: 'FFFFFF' };
            slide.addShape('rect', { x: 0, y: 0, w: 13.333, h: 0.12, line: { color: '1F6FC2', transparency: 100 }, fill: { color: '1F6FC2' } });
            slide.addText(title, { x: 0.42, y: 0.26, w: 12.45, h: 0.45, fontFace: 'Aptos', fontSize: 22, bold: true, color: '243746', margin: 0, fit: 'shrink', wrap: false });
            slide.addText(`出力日時: ${new Date().toLocaleString('ja-JP')}`, { x: 0.44, y: 0.76, w: 4.5, h: 0.2, fontFace: 'Aptos', fontSize: 7.5, color: '64748B', margin: 0 });
        }

        function addSectionLabel(slide, text, x, y, w, color) {
            slide.addText(text, { x, y, w, h: 0.28, fontFace: 'Aptos', fontSize: 11, bold: true, color, margin: 0, fit: 'shrink', wrap: false });
        }

        function domRichTextRuns(containerId, baseColor = '263746', preserveWhitespace = false) {
            const root = document.getElementById(containerId);
            const runs = [];
            const classColors = { 'tree-continue': '007BFF', 'tree-success': '28A745', 'tree-fail': 'DC3545' };
            const sameStyle = (a, b) => a.bold === b.bold && a.color === b.color && !a.breakLine && !b.breakLine;
            const markBreak = () => { if (runs.length) runs[runs.length - 1].options.breakLine = true; };
            function appendSegment(text, options) {
                if (!text) return;
                text = text.replace(/🔹\s*/g, '');
                if (!preserveWhitespace) text = text.replace(/[\t\r ]+/g, ' ');
                if (!preserveWhitespace && (!runs.length || runs[runs.length - 1].options.breakLine)) text = text.replace(/^ +/, '');
                if (!text) return;
                const previous = runs[runs.length - 1];
                if (previous && sameStyle(previous.options, options)) previous.text += text;
                else runs.push({ text, options: { ...options } });
            }
            function append(text, options, textNodeBreaks = false) {
                if (!text) return;
                if (!textNodeBreaks) { appendSegment(text.replace(/[\r\n]+/g, ' '), options); return; }
                const parts = text.replace(/\r/g, '').split('\n');
                parts.forEach((part, index) => { appendSegment(part, options); if (index < parts.length - 1) markBreak(); });
            }
            function walk(node, inherited = {}) {
                if (node.nodeType === Node.TEXT_NODE) { append(node.nodeValue, inherited, preserveWhitespace); return; }
                if (node.nodeType !== Node.ELEMENT_NODE) return;
                if (node.tagName === 'BR') { markBreak(); return; }
                const next = { ...inherited };
                if (node.tagName === 'STRONG' || node.tagName === 'B') next.bold = true;
                Array.from(node.classList || []).forEach(className => {
                    if (classColors[className]) { next.color = classColors[className]; next.bold = true; }
                });
                node.childNodes.forEach(child => walk(child, next));
            }
            root.childNodes.forEach(child => walk(child, { color: baseColor }));
            while (runs.length && !runs[0].text.trim()) runs.shift();
            while (runs.length && !runs[runs.length - 1].text.trim()) runs.pop();
            if (runs.length) {
                runs[0].text = runs[0].text.replace(/^\s+/, '');
                runs[runs.length - 1].text = runs[runs.length - 1].text.replace(/\s+$/, '');
                delete runs[runs.length - 1].options.breakLine;
            }
            return runs;
        }

        function matrixRows(containerId, accentColor) {
            const table = document.querySelector(`#${containerId} table`);
            if (!table) return [];
            return Array.from(table.rows).map((row, rowIndex) => Array.from(row.cells).map(cell => {
                const isHeader = cell.tagName === 'TH';
                const isTotal = cell.classList.contains('bg-total') || row.classList.contains('bg-total');
                const options = {
                    bold: isHeader || isTotal,
                    color: rowIndex === 0 ? 'FFFFFF' : '263746',
                    fill: rowIndex === 0 ? accentColor : (isTotal ? 'EAF0F6' : (isHeader ? 'F0F5FA' : 'FFFFFF')),
                    align: 'center', valign: 'middle', margin: 0.01, wrap: false,
                    border: { type: 'solid', color: 'C9D5E2', pt: 0.45 }
                };
                if (cell.colSpan > 1) options.colspan = cell.colSpan;
                if (cell.rowSpan > 1) options.rowspan = cell.rowSpan;
                return { text: cell.innerText.trim(), options };
            }));
        }

            slide.addText(domRichTextRuns('treeDetailContainerNull', '263746', true), {
                x: 0.42, y: 4.26, w: 12.45, h: 2.48,
                fontFace: 'Courier New', fontSize: 8.5, color: '263746',
                fill: { color: 'FFFFFF' }, line: { color: 'F2C078', pt: 0.8 },
                margin: 0.06, fit: 'shrink', valign: 'middle', wrap: false,
                breakLine: false, paraSpaceAfterPt: 0
            });
        }

        async function downloadPowerPoint() {
            if (document.getElementById('results').style.display === 'none' || !document.querySelector('#matrixContainer table')) {
                alert('先にシミュレーションを実行してください。'); return;
            }
            if (typeof PptxGenJS === 'undefined') {
                alert('PowerPoint出力ライブラリを読み込めませんでした。通信環境をご確認ください。'); return;
            }
            const button = document.getElementById('downloadPptxButton');
            button.disabled = true;
            const originalText = button.textContent;
            button.textContent = 'PowerPointを作成中…';
            try {
                const pptx = new PptxGenJS();
                pptx.layout = 'LAYOUT_WIDE';
                pptx.author = 'Clinical Trial Simulation Tool';
                pptx.subject = '平均差 中間解析2回&最終解析 シミュレーション結果';
                pptx.title = '臨床試験 平均差 中間解析2回&最終解析';
                pptx.company = '';
                pptx.lang = 'ja-JP';
                pptx.theme = { headFontFace: 'Aptos Display', bodyFontFace: 'Aptos', lang: 'ja-JP' };

                const slide = pptx.addSlide();
                addSlideFrame(pptx, slide, '臨床試験 平均差 中間解析2回&最終解析 シミュレーション結果');
                addSectionLabel(slide, 'シミュレーション結果（H1・H0）', 0.38, 1.02, 8.52, '1F6FC2');
                slide.addText(domRichTextRuns('basicResults'), {
                    x: 0.38, y: 1.34, w: 8.52, h: 1.36, fontFace: 'Aptos', fontSize: 11,
                    color: '263746', fill: { color: 'F7FAFC' }, line: { color: 'A8CBEA', pt: 0.7 },
                    margin: 0.07, fit: 'shrink', valign: 'middle', wrap: true, paraSpaceAfterPt: 0
                });

                const matrixColW = [1.1, 0.742, 0.742, 0.742, 0.742, 0.742, 0.742, 0.742, 0.742, 0.742, 0.742];
                addSectionLabel(slide, 'マトリックス H1（治療効果あり）', 0.38, 2.82, 8.52, '1F6FC2');
                slide.addTable(matrixRows('matrixContainer', '1F6FC2'), {
                    x: 0.38, y: 3.12, w: 8.52, h: 1.5, colW: matrixColW, rowH: 0.25,
                    fontFace: 'Aptos', fontSize: 11, color: '263746', margin: 0.01,
                    valign: 'middle', autoFit: false, fit: 'shrink', wrap: false
                });
                addSectionLabel(slide, 'マトリックス H0（帰無仮説）', 0.38, 4.78, 8.52, 'D97706');
                slide.addTable(matrixRows('matrixContainerNull', 'D97706'), {
                    x: 0.38, y: 5.08, w: 8.52, h: 1.5, colW: matrixColW, rowH: 0.25,
                    fontFace: 'Aptos', fontSize: 11, color: '263746', margin: 0.01,
                    valign: 'middle', autoFit: false, fit: 'shrink', wrap: false
                });

                addSectionLabel(slide, 'ディシジョンツリー（概要）H1', 9.08, 1.02, 3.85, '1F6FC2');
                slide.addText(domRichTextRuns('treeOverviewContainer', '263746', true), {
                    x: 9.08, y: 1.34, w: 3.85, h: 2.43, fontFace: 'Courier New', fontSize: 11,
                    color: '263746', line: { color: 'A8CBEA', pt: 0.7 }, margin: 0.05,
                    fit: 'shrink', valign: 'middle', wrap: false, paraSpaceAfterPt: 0
                });
                addSectionLabel(slide, 'ディシジョンツリー（概要）H0', 9.08, 3.88, 3.85, 'D97706');
                slide.addText(domRichTextRuns('treeOverviewContainerNull', '263746', true), {
                    x: 9.08, y: 4.2, w: 3.85, h: 2.43, fontFace: 'Courier New', fontSize: 11,

                const inputNote = [
                    `入力値：乱数シード=${document.getElementById('seedInput').value}、シミュレーション回数=${document.getElementById('simCount').value}`,
                    `治療群N（中間1／中間2／最終）=${document.getElementById('interim1SizeTreat').value}／${document.getElementById('interim2SizeTreat').value}／${document.getElementById('sampleSizeTreat').value}`,
                    `対照群N（中間1／中間2／最終）=${document.getElementById('interim1SizeControl').value}／${document.getElementById('interim2SizeControl').value}／${document.getElementById('sampleSizeControl').value}`,
                    `平均値（治療／対照）=${document.getElementById('meanTreat').value}／${document.getElementById('meanControl').value}、SD（治療／対照）=${document.getElementById('sdTreat').value}／${document.getElementById('sdControl').value}`,
                    `閾値（中間1 Go／No-Go、中間2 Go／No-Go、最終Go/No-Go）=${document.getElementById('interim1GoCutoff').value}／${document.getElementById('interim1NoGoCutoff').value}、${document.getElementById('interim2GoCutoff').value}／${document.getElementById('interim2NoGoCutoff').value}、${document.getElementById('finalCutoff').value}`
                ].join('　');
                slide.addText(inputNote, {
                    x: 0.38, y: 6.7, w: 12.55, h: 0.4, fontFace: 'Aptos', fontSize: 11,
                    color: '556575', margin: 0.01, fit: 'shrink', valign: 'top', wrap: true
                });

                addDetailedTreesSlide(pptx);

                const date = new Date();
                const stamp = `${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, '0')}${String(date.getDate()).padStart(2, '0')}`;
                await pptx.writeFile({ fileName: `interim2_normal_results_${stamp}.pptx`, compression: true });
            } catch (error) {
                console.error(error);
                alert('PowerPointの作成に失敗しました。シミュレーションを再実行してからお試しください。');
            } finally {
                button.disabled = false;
                button.textContent = originalText;
            }
        }

        function runSimulation() {
            const numSims = parseInt(document.getElementById('simCount').value) || 5000;
            const nTotalT = parseInt(document.getElementById('sampleSizeTreat').value);
            const n1T = parseInt(document.getElementById('interim1SizeTreat').value);
            const n2T = parseInt(document.getElementById('interim2SizeTreat').value);
            const nTotalC = parseInt(document.getElementById('sampleSizeControl').value);
            const n1C = parseInt(document.getElementById('interim1SizeControl').value);
            const n2C = parseInt(document.getElementById('interim2SizeControl').value);

            const meanT = parseFloat(document.getElementById('meanTreat').value);
            const meanC = parseFloat(document.getElementById('meanControl').value);
            const sdT = parseFloat(document.getElementById('sdTreat').value);
            const sdC = parseFloat(document.getElementById('sdControl').value);

            const g1 = parseFloat(document.getElementById('interim1GoCutoff').value);
            const ng1 = parseFloat(document.getElementById('interim1NoGoCutoff').value);
            const g2 = parseFloat(document.getElementById('interim2GoCutoff').value);
            const ng2 = parseFloat(document.getElementById('interim2NoGoCutoff').value);
            const finalCut = parseFloat(document.getElementById('finalCutoff').value);

            const add1T = n2T - n1T, add2T = nTotalT - n2T;
            const add1C = n2C - n1C, add2C = nTotalC - n2C;

            const p = (c) => (c / numSims * 100).toFixed(2) + '%';

            // 治療効果あり
            let counts = {g1g2g:0,g1g2n:0,g1c2g:0,g1c2n:0,g1n2g:0,g1n2n:0,
                          c1g2g:0,c1g2n:0,c1c2g:0,c1c2n:0,c1n2g:0,c1n2n:0,
                          n1g2g:0,n1g2n:0,n1c2g:0,n1c2n:0,n1n2g:0,n1n2n:0};

            for (let i = 0; i < numSims; i++) {
                const sT1 = Array.from({length: n1T}, () => normalRandom(meanT, sdT)).reduce((a,b)=>a+b,0);
                const sC1 = Array.from({length: n1C}, () => normalRandom(meanC, sdC)).reduce((a,b)=>a+b,0);
                const d1 = (sT1 / n1T) - (sC1 / n1C);

                const sT2 = Array.from({length: add1T}, () => normalRandom(meanT, sdT)).reduce((a,b)=>a+b,0);
                const sC2 = Array.from({length: add1C}, () => normalRandom(meanC, sdC)).reduce((a,b)=>a+b,0);
                const d2 = ((sT1 + sT2) / n2T) - ((sC1 + sC2) / n2C);

                const sT3 = Array.from({length: add2T}, () => normalRandom(meanT, sdT)).reduce((a,b)=>a+b,0);
                const sC3 = Array.from({length: add2C}, () => normalRandom(meanC, sdC)).reduce((a,b)=>a+b,0);
                const df = ((sT1 + sT2 + sT3) / nTotalT) - ((sC1 + sC2 + sC3) / nTotalC);

                const finalGo = df >= finalCut;

                if (d1 >= g1) {
                    if (d2 >= g2) finalGo ? counts.g1g2g++ : counts.g1g2n++;
                    else if (d2 <= ng2) finalGo ? counts.g1n2g++ : counts.g1n2n++;
                    else finalGo ? counts.g1c2g++ : counts.g1c2n++;
                } else if (d1 <= ng1) {
                    if (d2 >= g2) finalGo ? counts.n1g2g++ : counts.n1g2n++;
                    else if (d2 <= ng2) finalGo ? counts.n1n2g++ : counts.n1n2n++;
                    else finalGo ? counts.n1c2g++ : counts.n1c2n++;
                } else {
                    if (d2 >= g2) finalGo ? counts.c1g2g++ : counts.c1g2n++;
                    else if (d2 <= ng2) finalGo ? counts.c1n2g++ : counts.c1n2n++;
                    else finalGo ? counts.c1c2g++ : counts.c1c2n++;
                }
            }

            // 帰無仮説
            let countsNull = {g1g2g:0,g1g2n:0,g1c2g:0,g1c2n:0,g1n2g:0,g1n2n:0,
                              c1g2g:0,c1g2n:0,c1c2g:0,c1c2n:0,c1n2g:0,c1n2n:0,
                              n1g2g:0,n1g2n:0,n1c2g:0,n1c2n:0,n1n2g:0,n1n2n:0};

            for (let i = 0; i < numSims; i++) {
                const sT1 = Array.from({length: n1T}, () => normalRandom(meanC, sdT)).reduce((a,b)=>a+b,0);
                const sC1 = Array.from({length: n1C}, () => normalRandom(meanC, sdC)).reduce((a,b)=>a+b,0);
                const d1 = (sT1 / n1T) - (sC1 / n1C);

                const sT2 = Array.from({length: add1T}, () => normalRandom(meanC, sdT)).reduce((a,b)=>a+b,0);
                const sC2 = Array.from({length: add1C}, () => normalRandom(meanC, sdC)).reduce((a,b)=>a+b,0);
                const d2 = ((sT1 + sT2) / n2T) - ((sC1 + sC2) / n2C);

                const sT3 = Array.from({length: add2T}, () => normalRandom(meanC, sdT)).reduce((a,b)=>a+b,0);
                const sC3 = Array.from({length: add2C}, () => normalRandom(meanC, sdC)).reduce((a,b)=>a+b,0);
                const df = ((sT1 + sT2 + sT3) / nTotalT) - ((sC1 + sC2 + sC3) / nTotalC);

                const finalGo = df >= finalCut;

                if (d1 >= g1) {
                    if (d2 >= g2) finalGo ? countsNull.g1g2g++ : countsNull.g1g2n++;
                    else if (d2 <= ng2) finalGo ? countsNull.g1n2g++ : countsNull.g1n2n++;
                    else finalGo ? countsNull.g1c2g++ : countsNull.g1c2n++;
                } else if (d1 <= ng1) {
                    if (d2 >= g2) finalGo ? countsNull.n1g2g++ : countsNull.n1g2n++;
                    else if (d2 <= ng2) finalGo ? countsNull.n1n2g++ : countsNull.n1n2n++;
                    else finalGo ? countsNull.n1c2g++ : countsNull.n1c2n++;
                } else {
                    if (d2 >= g2) finalGo ? countsNull.c1g2g++ : countsNull.c1g2n++;
                    else if (d2 <= ng2) finalGo ? countsNull.c1n2g++ : countsNull.c1n2n++;
                    else finalGo ? countsNull.c1c2g++ : countsNull.c1c2n++;
                }
            }

            // 基本結果
            const overallGo = (counts.g1g2g + counts.g1c2g + counts.g1n2g + counts.g1g2n + counts.g1c2n + counts.g1n2n + counts.c1g2g + counts.c1g2n + counts.c1c2g) / numSims * 100;
            const overallGoCons = (counts.g1g2g + counts.g1c2g + counts.c1g2g + counts.c1c2g) / numSims * 100;
            const overallFalseGo = (countsNull.g1g2g + countsNull.g1c2g + countsNull.g1n2g + countsNull.g1g2n + countsNull.g1c2n + countsNull.g1n2n + countsNull.c1g2g + countsNull.c1g2n + countsNull.c1c2g) / numSims * 100;
            const overallFalseGoCons = (countsNull.g1g2g + countsNull.g1c2g + countsNull.g1n2g + countsNull.g1g2n + countsNull.g1c2n + countsNull.g1n2n + countsNull.c1g2g + countsNull.c1g2n + countsNull.c1c2g + countsNull.c1n2g + countsNull.n1g2g + countsNull.n1g2n + countsNull.n1c2g + countsNull.n1n2g) / numSims * 100;

            document.getElementById('basicResults').innerHTML = `
                <strong>治療効果ありの場合（指定した平均差）</strong><br>
                🔹 試験全体Go確率（中間1Go + 中間1継続かつ中間2Go + 中間1継続かつ中間2継続かつ最終Go）: <strong>${overallGo.toFixed(2)}%</strong><br>
                🔹 試験全体Go確率（保守的）（Go後も継続するとしても、中間1、中間2、最終いずれもNo-Goではない）: <strong>${overallGoCons.toFixed(2)}%</strong><br><br>
                <strong>治療効果なしの場合（帰無仮説）</strong><br>
                🔹 試験全体False-Go確率（中間1False Go + 中間1継続かつ中間2 False Go + 中間1継続かつ中間2継続かつ最終False Go）: <strong>${overallFalseGo.toFixed(2)}%</strong><br>
                🔹 試験全体False-Go確率（保守的）（No-Go後も継続するとしたとき、中間1、中間2、最終いずれかでFalse Go）: <strong>${overallFalseGoCons.toFixed(2)}%</strong>
            `;

            function createMatrix(countsData) {
                return `<table>
                    <thead>
                        <tr>
                            <th rowspan="2">中間1</th>
                            <th colspan="3">Go</th>
                            <th colspan="3">継続</th>
                            <th colspan="3">No-Go</th>
                            <th class="bg-total">合計</th>
                        </tr>
                        <tr>
                            <th colspan="3">${p(countsData.g1g2g + countsData.g1c2g + countsData.g1n2g + countsData.g1g2n + countsData.g1c2n + countsData.g1n2n)}</th>
                            <th colspan="3">${p(countsData.c1g2g + countsData.c1c2g + countsData.c1n2g + countsData.c1g2n + countsData.c1c2n + countsData.c1n2n)}</th>
                            <th colspan="3">${p(countsData.n1g2g + countsData.n1c2g + countsData.n1n2g + countsData.n1g2n + countsData.n1c2n + countsData.n1n2n)}</th>
                            <th class="bg-total">${p(Object.values(countsData).reduce((a,b)=>a+b,0))}</th>
                        </tr>
                        <tr>
                            <th>最終／中間2</th>
                            <th>Go</th><th>継続</th><th>No-Go</th>
                            <th>Go</th><th>継続</th><th>No-Go</th>
                            <th>Go</th><th>継続</th><th>No-Go</th>
                            <th class="bg-total">合計</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <th>Go</th>
                            <td>${p(countsData.g1g2g)}</td><td>${p(countsData.g1c2g)}</td><td>${p(countsData.g1n2g)}</td>
                            <td>${p(countsData.c1g2g)}</td><td>${p(countsData.c1c2g)}</td><td>${p(countsData.c1n2g)}</td>
                            <td>${p(countsData.n1g2g)}</td><td>${p(countsData.n1c2g)}</td><td>${p(countsData.n1n2g)}</td>
                            <td class="bg-total">${p(countsData.g1g2g + countsData.g1c2g + countsData.g1n2g + countsData.c1g2g + countsData.c1c2g + countsData.c1n2g + countsData.n1g2g + countsData.n1c2g + countsData.n1n2g)}</td>
                        </tr>
                        <tr>
                            <th>No-Go</th>
                            <td>${p(countsData.g1g2n)}</td><td>${p(countsData.g1c2n)}</td><td>${p(countsData.g1n2n)}</td>
                            <td>${p(countsData.c1g2n)}</td><td>${p(countsData.c1c2n)}</td><td>${p(countsData.c1n2n)}</td>
                            <td>${p(countsData.n1g2n)}</td><td>${p(countsData.n1c2n)}</td><td>${p(countsData.n1n2n)}</td>
                            <td class="bg-total">${p(countsData.g1g2n + countsData.g1c2n + countsData.g1n2n + countsData.c1g2n + countsData.c1c2n + countsData.c1n2n + countsData.n1g2n + countsData.n1c2n + countsData.n1n2n)}</td>
                        </tr>
                        <tr class="bg-total">
                            <th>合計</th>
                            <td>${p(countsData.g1g2g + countsData.g1g2n)}</td><td>${p(countsData.g1c2g + countsData.g1c2n)}</td><td>${p(countsData.g1n2g + countsData.g1n2n)}</td>
                            <td>${p(countsData.c1g2g + countsData.c1g2n)}</td><td>${p(countsData.c1c2g + countsData.c1c2n)}</td><td>${p(countsData.c1n2g + countsData.c1n2n)}</td>
                            <td>${p(countsData.n1g2g + countsData.n1g2n)}</td><td>${p(countsData.n1c2g + countsData.n1c2n)}</td><td>${p(countsData.n1n2g + countsData.n1n2n)}</td>
                            <td>${p(Object.values(countsData).reduce((a,b)=>a+b,0))}</td>
                        </tr>
                    </tbody>
                </table>`;
            }

            document.getElementById('matrixContainer').innerHTML = createMatrix(counts);
            document.getElementById('matrixContainerNull').innerHTML = createMatrix(countsNull);

            function createOverviewTree(countsData) {
                const totalG1 = countsData.g1g2g + countsData.g1g2n + countsData.g1c2g + countsData.g1c2n + countsData.g1n2g + countsData.g1n2n;
                const totalC1 = countsData.c1g2g + countsData.c1g2n + countsData.c1c2g + countsData.c1c2n + countsData.c1n2g + countsData.c1n2n;
                const totalNG1 = countsData.n1g2g + countsData.n1g2n + countsData.n1c2g + countsData.n1c2n + countsData.n1n2g + countsData.n1n2n;
                const totalC1G2 = countsData.c1g2g + countsData.c1g2n;
                const totalC1C2 = countsData.c1c2g + countsData.c1c2n;
                const totalC1N2 = countsData.c1n2g + countsData.c1n2n;
                const pct = (x) => (x / numSims * 100).toFixed(2);
                const cond = (x, den) => den ? (x / den * 100).toFixed(1) : '0.0';
                return `├─ <span class="tree-success">中間1 Go</span> (${pct(totalG1)}%)
├─ <span class="tree-continue">中間1 継続</span> (${pct(totalC1)}%)
│   ├─ <span class="tree-success">中間2 Go</span> (${pct(totalC1G2)}%)（条件付き ${cond(totalC1G2, totalC1)}%）
│   ├─ <span class="tree-continue">中間2 継続</span> (${pct(totalC1C2)}%)（条件付き ${cond(totalC1C2, totalC1)}%）
│   │   ├─ <span class="tree-success">最終Go</span> ${p(countsData.c1c2g)}（条件付き ${cond(countsData.c1c2g, totalC1C2)}%）
│   │   └─ <span class="tree-fail">最終No-Go</span> ${p(countsData.c1c2n)}（条件付き ${cond(countsData.c1c2n, totalC1C2)}%）
│   └─ <span class="tree-fail">中間2 No-Go</span> (${pct(totalC1N2)}%)（条件付き ${cond(totalC1N2, totalC1)}%）
└─ <span class="tree-fail">中間1 No-Go</span> (${pct(totalNG1)}%)`;
            }

            function createDetailedTree(countsData) {
                const totalG1 = countsData.g1g2g + countsData.g1g2n + countsData.g1c2g + countsData.g1c2n + countsData.g1n2g + countsData.g1n2n;
                const totalC1 = countsData.c1g2g + countsData.c1g2n + countsData.c1c2g + countsData.c1c2n + countsData.c1n2g + countsData.c1n2n;
                const totalNG1 = countsData.n1g2g + countsData.n1g2n + countsData.n1c2g + countsData.n1c2n + countsData.n1n2g + countsData.n1n2n;

                const pG1 = (totalG1 / numSims * 100).toFixed(2);
                const pC1 = (totalC1 / numSims * 100).toFixed(2);
                const pNG1 = (totalNG1 / numSims * 100).toFixed(2);

                const pG1G2 = (countsData.g1g2g + countsData.g1g2n) / numSims * 100;
                const pG1C2 = (countsData.g1c2g + countsData.g1c2n) / numSims * 100;
                const pG1NG2 = (countsData.g1n2g + countsData.g1n2n) / numSims * 100;

                const condG1G2 = totalG1 ? ((countsData.g1g2g + countsData.g1g2n) / totalG1 * 100).toFixed(1) : '0.0';
                const condG1C2 = totalG1 ? ((countsData.g1c2g + countsData.g1c2n) / totalG1 * 100).toFixed(1) : '0.0';
                const condG1NG2 = totalG1 ? ((countsData.g1n2g + countsData.g1n2n) / totalG1 * 100).toFixed(1) : '0.0';

                const pC1G2 = (countsData.c1g2g + countsData.c1g2n) / numSims * 100;
                const pC1C2 = (countsData.c1c2g + countsData.c1c2n) / numSims * 100;
                const pC1NG2 = (countsData.c1n2g + countsData.c1n2n) / numSims * 100;

                const condC1G2 = totalC1 ? ((countsData.c1g2g + countsData.c1g2n) / totalC1 * 100).toFixed(1) : '0.0';
                const condC1C2 = totalC1 ? ((countsData.c1c2g + countsData.c1c2n) / totalC1 * 100).toFixed(1) : '0.0';
                const condC1NG2 = totalC1 ? ((countsData.c1n2g + countsData.c1n2n) / totalC1 * 100).toFixed(1) : '0.0';

                const pNG1G2 = (countsData.n1g2g + countsData.n1g2n) / numSims * 100;
                const pNG1C2 = (countsData.n1c2g + countsData.n1c2n) / numSims * 100;
                const pNG1NG2 = (countsData.n1n2g + countsData.n1n2n) / numSims * 100;

                const condNG1G2 = totalNG1 ? ((countsData.n1g2g + countsData.n1g2n) / totalNG1 * 100).toFixed(1) : '0.0';
                const condNG1C2 = totalNG1 ? ((countsData.n1c2g + countsData.n1c2n) / totalNG1 * 100).toFixed(1) : '0.0';
                const condNG1NG2 = totalNG1 ? ((countsData.n1n2g + countsData.n1n2n) / totalNG1 * 100).toFixed(1) : '0.0';

                return `<div class="tree">
試験開始 (100.00%)
├─ <span class="tree-success">中間1 Go</span> (${pG1}%)
│   ├─ 中間2 Go (${pG1G2.toFixed(2)}%)（条件付き ${condG1G2}%） → 最終Go ${p(countsData.g1g2g)}（条件付き ${totalG1 && (countsData.g1g2g / (countsData.g1g2g + countsData.g1g2n) * 100).toFixed(1)}%） / No-Go ${p(countsData.g1g2n)}（条件付き ${totalG1 && (countsData.g1g2n / (countsData.g1g2g + countsData.g1g2n) * 100).toFixed(1)}%）
│   ├─ 中間2 継続 (${pG1C2.toFixed(2)}%)（条件付き ${condG1C2}%） → 最終Go ${p(countsData.g1c2g)}（条件付き ${totalG1 && (countsData.g1c2g / (countsData.g1c2g + countsData.g1c2n) * 100).toFixed(1)}%） / No-Go ${p(countsData.g1c2n)}（条件付き ${totalG1 && (countsData.g1c2n / (countsData.g1c2g + countsData.g1c2n) * 100).toFixed(1)}%）
│   └─ 中間2 No-Go (${pG1NG2.toFixed(2)}%)（条件付き ${condG1NG2}%） → 最終Go ${p(countsData.g1n2g)}（条件付き ${totalG1 && (countsData.g1n2g / (countsData.g1n2g + countsData.g1n2n) * 100).toFixed(1)}%） / No-Go ${p(countsData.g1n2n)}（条件付き ${totalG1 && (countsData.g1n2n / (countsData.g1n2g + countsData.g1n2n) * 100).toFixed(1)}%）
├─ <span class="tree-continue">中間1 継続</span> (${pC1}%)
│   ├─ <span class="tree-success">中間2 Go</span> (${pC1G2.toFixed(2)}%)（条件付き ${condC1G2}%） → 最終Go ${p(countsData.c1g2g)}（条件付き ${totalC1 && (countsData.c1g2g / (countsData.c1g2g + countsData.c1g2n) * 100).toFixed(1)}%） / No-Go ${p(countsData.c1g2n)}（条件付き ${totalC1 && (countsData.c1g2n / (countsData.c1g2g + countsData.c1g2n) * 100).toFixed(1)}%）
│   ├─ <span class="tree-continue">中間2 継続</span> (${pC1C2.toFixed(2)}%)（条件付き ${condC1C2}%） → <span class="tree-success">最終Go</span> ${p(countsData.c1c2g)}（条件付き ${totalC1 && (countsData.c1c2g / (countsData.c1c2g + countsData.c1c2n) * 100).toFixed(1)}%） / <span class="tree-fail">No-Go</span> ${p(countsData.c1c2n)}（条件付き ${totalC1 && (countsData.c1c2n / (countsData.c1c2g + countsData.c1c2n) * 100).toFixed(1)}%）
│   └─ <span class="tree-fail">中間2 No-Go</span> (${pC1NG2.toFixed(2)}%)（条件付き ${condC1NG2}%） → 最終Go ${p(countsData.c1n2g)}（条件付き ${totalC1 && (countsData.c1n2g / (countsData.c1n2g + countsData.c1n2n) * 100).toFixed(1)}%） / No-Go ${p(countsData.c1n2n)}（条件付き ${totalC1 && (countsData.c1n2n / (countsData.c1n2g + countsData.c1n2n) * 100).toFixed(1)}%）
└─ <span class="tree-fail">中間1 No-Go</span> (${pNG1}%)
    ├─ 中間2 Go (${pNG1G2.toFixed(2)}%)（条件付き ${condNG1G2}%） → 最終Go ${p(countsData.n1g2g)}（条件付き ${totalNG1 && (countsData.n1g2g / (countsData.n1g2g + countsData.n1g2n) * 100).toFixed(1)}%） / No-Go ${p(countsData.n1g2n)}（条件付き ${totalNG1 && (countsData.n1g2n / (countsData.n1g2g + countsData.n1g2n) * 100).toFixed(1)}%）
    ├─ 中間2 継続 (${pNG1C2.toFixed(2)}%)（条件付き ${condNG1C2}%） → 最終Go ${p(countsData.n1c2g)}（条件付き ${totalNG1 && (countsData.n1c2g / (countsData.n1c2g + countsData.n1c2n) * 100).toFixed(1)}%） / No-Go ${p(countsData.n1c2n)}（条件付き ${totalNG1 && (countsData.n1c2n / (countsData.n1c2g + countsData.n1c2n) * 100).toFixed(1)}%）
    └─ 中間2 No-Go (${pNG1NG2.toFixed(2)}%)（条件付き ${condNG1NG2}%） → 最終Go ${p(countsData.n1n2g)}（条件付き ${totalNG1 && (countsData.n1n2g / (countsData.n1n2g + countsData.n1n2n) * 100).toFixed(1)}%） / No-Go ${p(countsData.n1n2n)}（条件付き ${totalNG1 && (countsData.n1n2n / (countsData.n1n2g + countsData.n1n2n) * 100).toFixed(1)}%）
</div>`;
            }

            document.getElementById('treeOverviewContainer').innerHTML = createOverviewTree(counts);
            document.getElementById('treeDetailContainer').innerHTML = createDetailedTree(counts);
            document.getElementById('treeOverviewContainerNull').innerHTML = createOverviewTree(countsNull);
            document.getElementById('treeDetailContainerNull').innerHTML = createDetailedTree(countsNull);

            document.getElementById('results').style.display = 'block';

            toggleSection('basic'); toggleSection('matrix'); toggleSection('treeOverview'); toggleSection('treeDetail');
        }
    </script>
