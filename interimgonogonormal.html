    <script>
function ctSelectedDigits(id, fallback) {
    const el = document.getElementById(id);
    const value = el ? Number(el.value) : fallback;
    return Number.isInteger(value) ? value : fallback;
}

function ctProbabilityDigits() {
    return ctSelectedDigits('probabilityDigits', 1);
}

function ctAlphaPValueDigits() {
    return ctSelectedDigits('pvalueDigits', 3);
}

function ctThresholdDigits() {
    return ctSelectedDigits('thresholdDigits', 3);
}

function ctFmtFixed(value, digits) {
    const number = Number(value);
    return Number.isFinite(number) ? number.toFixed(digits) : '-';
}

function ctFmtPct(value) {
    return ctFmtFixed(value, ctProbabilityDigits());
}

function ctFmtAlphaP(value) {
    return ctFmtFixed(value, ctAlphaPValueDigits());
}

function ctFmtThreshold(value) {
    return ctFmtFixed(value, ctThresholdDigits());
}

function ctInputDecimalPlaces(id) {
    const el = document.getElementById(id);
    if (!el) return 0;
    const raw = String(el.value || '');
    const match = raw.match(/[.,](\d+)/);
    return match ? match[1].length : 0;
}

function ctFmtLikeInput(value, inputId) {
    return ctFmtFixed(value, ctInputDecimalPlaces(inputId));
}

</script>
    <script>
let xorSeed = 123456789;
        let scatterChartInstance = null;
        let scatterChartNullInstance = null;

        function xorshiftRandom() {
            xorSeed ^= xorSeed << 13; xorSeed ^= xorSeed >>> 17; xorSeed ^= xorSeed << 5;
            return (xorSeed >>> 0) / 4294967296;
        }
        function normalRandom(mean = 0, sd = 1) {
            let u = 0, v = 0;
            while (u === 0) u = xorshiftRandom();
            while (v === 0) v = xorshiftRandom();
            let z = Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
            return mean + z * sd;
        }

        function toggleSection(section) {
            const checked = document.getElementById('toggle' + section.charAt(0).toUpperCase() + section.slice(1)).checked;
            if (section === 'basic') {
                document.getElementById('basicTitle').style.display = checked ? 'block' : 'none';
                document.getElementById('basicResults').style.display = checked ? 'block' : 'none';
                return;
            }

            const itemMap = {
                scatter: ['effectScatterTitle', 'scatterContainer', 'nullScatterTitle', 'scatterContainerNull'],
                matrix: ['effectMatrixTitle', 'matrixContainer', 'nullMatrixTitle', 'matrixContainerNull'],
                tree: ['effectTreeTitle', 'treeContainer', 'nullTreeTitle', 'treeContainerNull']
            };
            (itemMap[section] || []).forEach(id => {
                document.getElementById(id).style.display = checked ? 'block' : 'none';
            });

            const hasDetails = ['scatter', 'matrix', 'tree']
                .some(key => document.getElementById('toggle' + key.charAt(0).toUpperCase() + key.slice(1)).checked);
            document.getElementById('nullDetails').style.display = hasDetails ? 'block' : 'none';
            document.getElementById('nullTitle').style.display = hasDetails ? 'block' : 'none';
        }

        function addSlideFrame(pptx, slide, title) {
            slide.background = { color: 'FFFFFF' };
            slide.addShape('rect', { x: 0, y: 0, w: 13.333, h: 0.12, line: { color: '1F6FC2', transparency: 100 }, fill: { color: '1F6FC2' } });
            slide.addText(title, { x: 0.42, y: 0.26, w: 12.45, h: 0.45, fontFace: 'Aptos', fontSize: 22, bold: true, color: '243746', margin: 0, fit: 'shrink', wrap: false });
            slide.addText(`出力日時: ${new Date().toLocaleString('ja-JP')}`, { x: 0.44, y: 0.76, w: 4.5, h: 0.2, fontFace: 'Aptos', fontSize: 7.5, color: '64748B', margin: 0 });
        }

        function addSectionLabel(slide, text, x, y, w, color) {
            slide.addText(text, { x, y, w, h: 0.3, fontFace: 'Aptos', fontSize: 11, bold: true, color, margin: 0, fit: 'shrink', wrap: false });
        }

        function matrixRows(containerId, accentColor) {
            const table = document.querySelector(`#${containerId} table`);
            if (!table) return [];
            return Array.from(table.rows).map((row, rowIndex) => Array.from(row.cells).map((cell, colIndex) => ({
                text: cell.innerText.trim(),
                options: {
                    bold: rowIndex === 0 || colIndex === 0 || cell.classList.contains('bg-total'),
                    color: rowIndex === 0 ? 'FFFFFF' : '263746',
                    fill: rowIndex === 0 ? accentColor : (cell.classList.contains('bg-total') || row.classList.contains('bg-total') ? 'EAF0F6' : 'FFFFFF'),
                    align: 'center', valign: 'middle', margin: 0.02, wrap: false,
                    border: { type: 'solid', color: 'C9D5E2', pt: 0.5 }
                }
            })));
        }

        function domRichTextRuns(containerId, baseColor = '263746', preserveWhitespace = false) {
            const root = document.getElementById(containerId);
            const runs = [];
            const classColors = { 'tree-continue': '007BFF', 'tree-success': '28A745', 'tree-fail': 'DC3545' };
            const sameStyle = (a, b) => a.bold === b.bold && a.color === b.color && !a.breakLine && !b.breakLine;
            const markBreak = () => { if (runs.length) runs[runs.length - 1].options.breakLine = true; };
            function appendSegment(text, options) {
                if (!text) return;
                text = text.replace(/🔹\s*/g, '');
                if (!preserveWhitespace) text = text.replace(/[\t\r ]+/g, ' ');
                if (!preserveWhitespace && (!runs.length || runs[runs.length - 1].options.breakLine)) text = text.replace(/^ +/, '');
                if (!text) return;
                const previous = runs[runs.length - 1];
                if (previous && sameStyle(previous.options, options)) previous.text += text;
                else runs.push({ text, options: { ...options } });
            }
            function append(text, options, textNodeBreaks = false) {
                if (!text) return;
                if (!textNodeBreaks) { appendSegment(text.replace(/[\r\n]+/g, ' '), options); return; }
                const parts = text.replace(/\r/g, '').split('\n');
                parts.forEach((part, index) => { appendSegment(part, options); if (index < parts.length - 1) markBreak(); });
            }
            function walk(node, inherited = {}) {
                if (node.nodeType === Node.TEXT_NODE) { append(node.nodeValue, inherited, preserveWhitespace); return; }
                if (node.nodeType !== Node.ELEMENT_NODE) return;
                if (node.tagName === 'BR') { markBreak(); return; }
                const next = { ...inherited };
                if (node.tagName === 'STRONG' || node.tagName === 'B') next.bold = true;
                Array.from(node.classList || []).forEach(className => {
                    if (classColors[className]) { next.color = classColors[className]; next.bold = true; }
                });
                node.childNodes.forEach(child => walk(child, next));
            }
            root.childNodes.forEach(child => walk(child, { color: baseColor }));
            while (runs.length && !runs[0].text.trim()) runs.shift();
            while (runs.length && !runs[runs.length - 1].text.trim()) runs.pop();
            if (runs.length) {
                runs[0].text = runs[0].text.replace(/^\s+/, '');
                runs[runs.length - 1].text = runs[runs.length - 1].text.replace(/\s+$/, '');
                delete runs[runs.length - 1].options.breakLine;
            }
            return runs;
        }

        function addChartSlide(pptx, title, chart) {
            if (!chart) return;
            const slide = pptx.addSlide();
            addSlideFrame(pptx, slide, title);
            const data = chart.toBase64Image('image/png', 1);
            const ratio = chart.canvas.width / chart.canvas.height;
            const maxW = 12.0, maxH = 5.95;
            let w = maxW, h = w / ratio;
            if (h > maxH) { h = maxH; w = h * ratio; }
            slide.addImage({ data, x: (13.333 - w) / 2, y: 1.15 + (maxH - h) / 2, w, h });
        }

            pptx.title = '臨床試験 平均差 中間3段階基準用';
            pptx.company = '';
            pptx.lang = 'ja-JP';
            pptx.theme = { headFontFace: 'Aptos Display', bodyFontFace: 'Aptos', lang: 'ja-JP' };

            const slide = pptx.addSlide();
            addSlideFrame(pptx, slide, '臨床試験 平均差 中間3段階基準 シミュレーション結果');
            const inputRows = [
                [{ text: '入力項目', options: { bold: true, color: 'FFFFFF', fill: '1F6FC2' } }, { text: '設定値', options: { bold: true, color: 'FFFFFF', fill: '1F6FC2' } }],
                ['乱数シード / 回数', `${document.getElementById('seedInput').value} / ${document.getElementById('simCount').value}`],
                ['治療群N（最終 / 中間）', `${document.getElementById('sampleSizeTreat').value} / ${document.getElementById('interimSizeTreat').value}`],
                ['対照群N（最終 / 中間）', `${document.getElementById('sampleSizeControl').value} / ${document.getElementById('interimSizeControl').value}`],
                ['平均値（治療 / 対照）', `${document.getElementById('meanTreat').value} / ${document.getElementById('meanControl').value}`],
                ['SD（治療 / 対照）', `${document.getElementById('sdTreat').value} / ${document.getElementById('sdControl').value}`],
                ['中間閾値（Go / No-Go）', `${document.getElementById('interimGoCutoff').value} / ${document.getElementById('interimNoGoCutoff').value}`],
                ['最終Go/No-Go閾値', document.getElementById('finalCutoff').value]
            ];
            addSectionLabel(slide, '入力値', 0.38, 1.02, 4.0, '1F6FC2');
            slide.addTable(inputRows, { x: 0.38, y: 1.35, w: 4.0, h: 2.12, colW: [2.55, 1.45], rowH: 0.26, fontFace: 'Aptos', fontSize: 11, color: '263746', margin: 0.02, border: { type: 'solid', color: 'C9D5E2', pt: 0.5 }, valign: 'middle', autoFit: false, fit: 'shrink', wrap: false });

            addSectionLabel(slide, '基本結果 H1（治療効果あり）', 0.38, 3.62, 4.0, '1F6FC2');
            slide.addText(domRichTextRuns('resEffect'), { x: 0.38, y: 3.94, w: 4.0, h: 1.12, fontFace: 'Aptos', fontSize: 11, color: '263746', fill: { color: 'EAF4FC' }, line: { color: 'A8CBEA', pt: 0.7 }, margin: 0.07, fit: 'shrink', valign: 'middle', wrap: true });
            addSectionLabel(slide, '基本結果 H0（治療効果なし）', 0.38, 5.22, 4.0, 'D97706');
            slide.addText(domRichTextRuns('resNull'), { x: 0.38, y: 5.54, w: 4.0, h: 1.18, fontFace: 'Aptos', fontSize: 11, color: '263746', fill: { color: 'FFF3E0' }, line: { color: 'F2C078', pt: 0.7 }, margin: 0.07, fit: 'shrink', valign: 'middle', wrap: true });

            addSectionLabel(slide, '確率マトリックス H1', 4.57, 1.02, 4.1, '1F6FC2');
            slide.addTable(matrixRows('matrixContainer', '1F6FC2'), { x: 4.57, y: 1.35, w: 4.1, h: 1.85, colW: [1.1, 0.72, 0.8, 0.78, 0.7], rowH: 0.45, fontFace: 'Aptos', fontSize: 11, margin: 0.015, valign: 'middle', autoFit: false, fit: 'shrink', wrap: false });
            addSectionLabel(slide, '確率マトリックス H0', 4.57, 3.7, 4.1, 'D97706');
            slide.addTable(matrixRows('matrixContainerNull', 'D97706'), { x: 4.57, y: 4.03, w: 4.1, h: 1.85, colW: [1.1, 0.72, 0.8, 0.78, 0.7], rowH: 0.45, fontFace: 'Aptos', fontSize: 11, margin: 0.015, valign: 'middle', autoFit: false, fit: 'shrink', wrap: false });

            addSectionLabel(slide, 'ディシジョンツリー H1', 8.9, 1.02, 4.03, '1F6FC2');
            slide.addText(domRichTextRuns('treeContainer', '263746', true), { x: 8.9, y: 1.35, w: 4.03, h: 2.32, fontFace: 'Courier New', fontSize: 11, color: '263746', line: { color: 'A8CBEA', pt: 0.7 }, margin: 0.045, fit: 'shrink', valign: 'middle', wrap: false });
            addSectionLabel(slide, 'ディシジョンツリー H0', 8.9, 3.78, 4.03, 'D97706');
            slide.addText(domRichTextRuns('treeContainerNull', '263746', true), { x: 8.9, y: 4.1, w: 4.03, h: 2.32, fontFace: 'Courier New', fontSize: 11, color: '263746', line: { color: 'F2C078', pt: 0.7 }, margin: 0.045, fit: 'shrink', valign: 'middle', wrap: false });

            addChartSlide(pptx, '中間 vs 最終 散布図（H1：治療効果あり）', scatterChartInstance);
            addChartSlide(pptx, '中間 vs 最終 散布図（H0：治療効果なし）', scatterChartNullInstance);
            const date = new Date();
            const stamp = `${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, '0')}${String(date.getDate()).padStart(2, '0')}`;
            await pptx.writeFile({ fileName: `interim_go_nogo_normal_results_${stamp}.pptx`, compression: true });
        }

        function runSimulation() {
            const numSims = parseInt(document.getElementById('simCount').value) || 5000;
            const nTreatTotal = parseInt(document.getElementById('sampleSizeTreat').value);
            const nControlTotal = parseInt(document.getElementById('sampleSizeControl').value);
            const nTreatInterim = parseInt(document.getElementById('interimSizeTreat').value);
            const nControlInterim = parseInt(document.getElementById('interimSizeControl').value);
            const meanTreat = parseFloat(document.getElementById('meanTreat').value);
            const meanControl = parseFloat(document.getElementById('meanControl').value);
            const sdTreat = parseFloat(document.getElementById('sdTreat').value);
            const sdControl = parseFloat(document.getElementById('sdControl').value);
            const cutoffInterimGo = parseFloat(document.getElementById('interimGoCutoff').value);
            const cutoffInterimNoGo = parseFloat(document.getElementById('interimNoGoCutoff').value);
            const cutoffFinal = parseFloat(document.getElementById('finalCutoff').value);

            const nTreatAdd = nTreatTotal - nTreatInterim;
            const nControlAdd = nControlTotal - nControlInterim;

            // ====================== 治療効果あり ======================
            const results = [];
            for (let i = 0; i < numSims; i++) {
                const sumTreat1 = Array.from({length: nTreatInterim}, () => normalRandom(meanTreat, sdTreat)).reduce((a,b)=>a+b,0);
                const sumControl1 = Array.from({length: nControlInterim}, () => normalRandom(meanControl, sdControl)).reduce((a,b)=>a+b,0);
                const interimDiff = (sumTreat1 / nTreatInterim) - (sumControl1 / nControlInterim);

                const sumTreat2 = Array.from({length: nTreatAdd}, () => normalRandom(meanTreat, sdTreat)).reduce((a,b)=>a+b,0);
                const sumControl2 = Array.from({length: nControlAdd}, () => normalRandom(meanControl, sdControl)).reduce((a,b)=>a+b,0);
                const finalDiff = ((sumTreat1 + sumTreat2) / nTreatTotal) - ((sumControl1 + sumControl2) / nControlTotal);

                results.push({interim: interimDiff, final: finalDiff});
            }

            let gg=0, gn=0, cg=0, cn=0, ng=0, nn=0;
            results.forEach(r => {
                if (r.interim >= cutoffInterimGo) {
                    if (r.final >= cutoffFinal) gg++; else gn++;
                } else if (r.interim <= cutoffInterimNoGo) {
                    if (r.final >= cutoffFinal) ng++; else nn++;
                } else {
                    if (r.final >= cutoffFinal) cg++; else cn++;
                }
            });

            const pGG = (gg / numSims) * 100;
            const pGN = (gn / numSims) * 100;
            const pCG = (cg / numSims) * 100;
            const pCN = (cn / numSims) * 100;
            const pNG = (ng / numSims) * 100;
            const pNN = (nn / numSims) * 100;

            const pGoInterim = pGG + pGN;
            const pContinue = pCG + pCN;
            const pNoGoInterim = pNG + pNN;

            const pOverallGoInclusive = pGG + pGN + pCG;
            const pOverallGoConservative = pGG + pCG;

            const condCG = pContinue > 0 ? ctFmtPct(pCG / pContinue * 100) : ctFmtPct(0);
            const condCN = pContinue > 0 ? ctFmtPct(pCN / pContinue * 100) : ctFmtPct(0);

            document.getElementById('resEffect').innerHTML = `
                🔹 <strong>中間確率:</strong> Go (${ctFmtPct(pGoInterim)}%) / 継続 (${ctFmtPct(pContinue)}%) / No-Go (${ctFmtPct(pNoGoInterim)}%)<br>
                🔹 <strong>試験全体Go確率（中間Go＋中間継続かつ最終Go）:</strong> ${ctFmtPct(pOverallGoInclusive)}%<br>
                🔹 <strong>試験全体Go確率（保守的）（中間Goかつ最終Go＋中間継続かつ最終Go）:</strong> ${ctFmtPct(pOverallGoConservative)}%
            `;

            // ====================== 帰無仮説 ======================
            const resultsNull = [];
            for (let i = 0; i < numSims; i++) {
                const sumTreat1 = Array.from({length: nTreatInterim}, () => normalRandom(meanControl, sdTreat)).reduce((a,b)=>a+b,0);
                const sumControl1 = Array.from({length: nControlInterim}, () => normalRandom(meanControl, sdControl)).reduce((a,b)=>a+b,0);
                const interimDiff = (sumTreat1 / nTreatInterim) - (sumControl1 / nControlInterim);

                const sumTreat2 = Array.from({length: nTreatAdd}, () => normalRandom(meanControl, sdTreat)).reduce((a,b)=>a+b,0);
                const sumControl2 = Array.from({length: nControlAdd}, () => normalRandom(meanControl, sdControl)).reduce((a,b)=>a+b,0);
                const finalDiff = ((sumTreat1 + sumTreat2) / nTreatTotal) - ((sumControl1 + sumControl2) / nControlTotal);

                resultsNull.push({interim: interimDiff, final: finalDiff});
            }

            let ggN=0, gnN=0, cgN=0, cnN=0, ngN=0, nnN=0;
            resultsNull.forEach(r => {
                if (r.interim >= cutoffInterimGo) {
                    if (r.final >= cutoffFinal) ggN++; else gnN++;
                } else if (r.interim <= cutoffInterimNoGo) {
                    if (r.final >= cutoffFinal) ngN++; else nnN++;
                } else {
                    if (r.final >= cutoffFinal) cgN++; else cnN++;
                }
            });

            const pGGN = (ggN / numSims) * 100;
            const pGNN = (gnN / numSims) * 100;
            const pCGN = (cgN / numSims) * 100;
            const pCNN = (cnN / numSims) * 100;
            const pNGN = (ngN / numSims) * 100;
            const pNNN = (nnN / numSims) * 100;

            const pGoInterimN = pGGN + pGNN;
            const pContinueN = pCGN + pCNN;
            const pNoGoInterimN = pNGN + pNNN;

            const pOverallFalseGoInclusive = pGGN + pGNN + pCGN;
            const pOverallFalseGoConservative = pGGN + pGNN + pCGN + pNGN;

            const condCGN = pContinueN > 0 ? ctFmtPct(pCGN / pContinueN * 100) : ctFmtPct(0);
            const condCNN = pContinueN > 0 ? ctFmtPct(pCNN / pContinueN * 100) : ctFmtPct(0);

            document.getElementById('resNull').innerHTML = `
                🔹 <strong>中間確率:</strong> False-Go (${ctFmtPct(pGoInterimN)}%) / 継続 (${ctFmtPct(pContinueN)}%) / No-Go (${ctFmtPct(pNoGoInterimN)}%)<br>
                🔹 <strong>試験全体False-Go確率（中間False Go＋中間継続かつ最終False Go）:</strong> ${ctFmtPct(pOverallFalseGoInclusive)}%<br>
                🔹 <strong>試験全体False-Go確率（保守的）（中間、最終のいずれかFalse Go）:</strong> ${ctFmtPct(pOverallFalseGoConservative)}%
            `;

            // 散布図
            if (scatterChartInstance) scatterChartInstance.destroy();
            if (scatterChartNullInstance) scatterChartNullInstance.destroy();

            const drawLines = (chart) => {
                const {ctx, scales} = chart;
                const x = scales.x, y = scales.y;
                ctx.save();
                ctx.lineWidth = 2.5;
                ctx.setLineDash([6,3]);
                ctx.strokeStyle = '#d32f2f';
                ctx.beginPath();
                ctx.moveTo(x.getPixelForValue(cutoffFinal), y.top);
                ctx.lineTo(x.getPixelForValue(cutoffFinal), y.bottom);
                ctx.stroke();

                ctx.strokeStyle = '#28a745';
                ctx.beginPath();
                ctx.moveTo(x.left, y.getPixelForValue(cutoffInterimGo));
                ctx.lineTo(x.right, y.getPixelForValue(cutoffInterimGo));
                ctx.stroke();

                ctx.strokeStyle = '#d32f2f';
                ctx.beginPath();
                ctx.moveTo(x.left, y.getPixelForValue(cutoffInterimNoGo));
                ctx.lineTo(x.right, y.getPixelForValue(cutoffInterimNoGo));
                ctx.stroke();

                ctx.setLineDash([]);
                ctx.restore();
            };

            scatterChartInstance = new Chart(document.getElementById('scatterChart'), {
                type: 'scatter',
                data: { datasets: [{ label: 'シミュレーション結果', data: results.map(r => ({x: r.final, y: r.interim})), backgroundColor: 'rgba(54,162,235,0.55)', pointRadius: 2.2 }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { title: { display: true, text: '中間 vs 最終平均差（治療効果あり）', font: { size: 16 } }, legend: { display: false } },
                    scales: { x: { title: { display: true, text: '最終平均差' } }, y: { title: { display: true, text: '中間平均差' } } }
                },
                plugins: [{ beforeDraw: (chart) => drawLines(chart) }]
            });

            scatterChartNullInstance = new Chart(document.getElementById('scatterChartNull'), {
                type: 'scatter',
                data: { datasets: [{ label: 'シミュレーション結果（帰無仮説）', data: resultsNull.map(r => ({x: r.final, y: r.interim})), backgroundColor: 'rgba(255,152,0,0.55)', pointRadius: 2.2 }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { title: { display: true, text: '中間 vs 最終平均差（帰無仮説）', font: { size: 16 } }, legend: { display: false } },
                    scales: { x: { title: { display: true, text: '最終平均差' } }, y: { title: { display: true, text: '中間平均差' } } }
                },
                plugins: [{ beforeDraw: (chart) => drawLines(chart) }]
            });

            document.getElementById('results').style.display = 'block';

            // マトリックス
            document.getElementById('matrixContainer').innerHTML = `
                <table>
                    <thead><tr><th>最終 ＼ 中間</th><th>Go</th><th>継続</th><th>No-Go</th><th class="bg-total">合計</th></tr></thead>
                    <tbody>
                        <tr><th>Go</th><td><strong>${ctFmtPct(pGG)}%</strong></td><td><strong>${ctFmtPct(pCG)}%</strong></td><td><strong>${ctFmtPct(pNG)}%</strong></td><td class="bg-total">${ctFmtPct(pGG + pCG + pNG)}%</td></tr>
                        <tr><th>No-Go</th><td><strong>${ctFmtPct(pGN)}%</strong></td><td><strong>${ctFmtPct(pCN)}%</strong></td><td><strong>${ctFmtPct(pNN)}%</strong></td><td class="bg-total">${ctFmtPct(pGN + pCN + pNN)}%</td></tr>
                        <tr class="bg-total"><th>合計</th><td>${ctFmtPct(pGoInterim)}%</td><td>${ctFmtPct(pContinue)}%</td><td>${ctFmtPct(pNoGoInterim)}%</td><td>${ctFmtPct(100)}%</td></tr>
                    </tbody>
                </table>`;

            document.getElementById('matrixContainerNull').innerHTML = `
                <table>
                    <thead><tr><th>最終 ＼ 中間</th><th>Go</th><th>継続</th><th>No-Go</th><th class="bg-total">合計</th></tr></thead>
                    <tbody>
                        <tr><th>Go</th><td><strong>${ctFmtPct(pGGN)}%</strong></td><td><strong>${ctFmtPct(pCGN)}%</strong></td><td><strong>${ctFmtPct(pNGN)}%</strong></td><td class="bg-total">${ctFmtPct(pGGN + pCGN + pNGN)}%</td></tr>
                        <tr><th>No-Go</th><td><strong>${ctFmtPct(pGNN)}%</strong></td><td><strong>${ctFmtPct(pCNN)}%</strong></td><td><strong>${ctFmtPct(pNNN)}%</strong></td><td class="bg-total">${ctFmtPct(pGNN + pCNN + pNNN)}%</td></tr>
                        <tr class="bg-total"><th>合計</th><td>${ctFmtPct(pGoInterimN)}%</td><td>${ctFmtPct(pContinueN)}%</td><td>${ctFmtPct(pNoGoInterimN)}%</td><td>${ctFmtPct(100)}%</td></tr>
                    </tbody>
                </table>`;

            // ====================== ディシジョンツリー（条件付確率付き） ======================
            document.getElementById('treeContainer').innerHTML = `
<div class="tree">
試験開始 (${ctFmtPct(100)}%)
├─ <span class="tree-success">中間Go</span> (${ctFmtPct(pGoInterim)}%)
│   ├─ 最終Go ${ctFmtPct(pGG)}%
│   └─ 最終No-Go ${ctFmtPct(pGN)}%
├─ <span class="tree-continue">中間継続</span> (${ctFmtPct(pContinue)}%)
│   ├─ <span class="tree-success">最終Go</span> ${ctFmtPct(pCG)}% （条件付 ${condCG}%）
│   └─ <span class="tree-fail">最終No-Go</span> ${ctFmtPct(pCN)}% （条件付 ${condCN}%）
└─ <span class="tree-fail">中間No-Go</span> (${ctFmtPct(pNoGoInterim)}%)
    ├─ 最終Go ${ctFmtPct(pNG)}%
    └─ 最終No-Go ${ctFmtPct(pNN)}%
</div>`;

            document.getElementById('treeContainerNull').innerHTML = `
<div class="tree">
試験開始 (${ctFmtPct(100)}%)
├─ <span class="tree-success">中間Go</span> (${ctFmtPct(pGoInterimN)}%)
│   ├─ 最終Go ${ctFmtPct(pGGN)}%
│   └─ 最終No-Go ${ctFmtPct(pGNN)}%
├─ <span class="tree-continue">中間継続</span> (${ctFmtPct(pContinueN)}%)
│   ├─ <span class="tree-success">最終Go</span> ${ctFmtPct(pCGN)}% （条件付 ${condCGN}%）
│   └─ <span class="tree-fail">最終No-Go</span> ${ctFmtPct(pCNN)}% （条件付 ${condCNN}%）
└─ <span class="tree-fail">中間No-Go</span> (${ctFmtPct(pNoGoInterimN)}%)
    ├─ 最終Go ${ctFmtPct(pNGN)}%
    └─ 最終No-Go ${ctFmtPct(pNNN)}%
</div>`;

            toggleSection('basic'); 
            toggleSection('scatter'); toggleSection('matrix'); toggleSection('tree');
        }

</script>
