    <script>
function erf(x) {
    const sign = x >= 0 ? 1 : -1;
    x = Math.abs(x);
    const a1 = 0.254829592, a2 = -0.284496736, a3 = 1.421413741, a4 = -1.453152027, a5 = 1.061405429, p = 0.3275911;
    const t = 1 / (1 + p * x);
    const y = 1 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);
    return sign * y;
}

function chiSq1Pvalue(x) { return x <= 0 ? 1 : Math.max(0, Math.min(1, 1 - erf(Math.sqrt(x / 2)))); }
function safeNum(id, def) { const v = parseFloat(document.getElementById(id).value); return Number.isFinite(v) ? v : def; }

const logFactCache = [0];
function logFact(n) { for (let i = logFactCache.length; i <= n; i++) logFactCache[i] = logFactCache[i - 1] + Math.log(i); return logFactCache[n]; }
function logChoose(n, k) { if (k < 0 || k > n) return -Infinity; return logFact(n) - logFact(k) - logFact(n - k); }
function hypergeomProb(a, r1, c1, n) { return Math.exp(logChoose(c1, a) + logChoose(n - c1, r1 - a) - logChoose(n, r1)); }

function fisherPvalue(a, b, c, d, side) {
    const r1 = a + b, c1 = a + c, n = r1 + c + d;
    const minA = Math.max(0, r1 - (n - c1)), maxA = Math.min(r1, c1);
    const obs = hypergeomProb(a, r1, c1, n);
    let p = 0;
    if (side === 'one') {
        for (let x = a; x <= maxA; x++) p += hypergeomProb(x, r1, c1, n);
    } else {
        for (let x = minA; x <= maxA; x++) {
            const pr = hypergeomProb(x, r1, c1, n);
            if (pr <= obs + 1e-12) p += pr;
        }
    }
    return Math.min(1, p);
}

function chiSquareStat(a, b, c, d, yates) {
    const n = a + b + c + d;
    const r1 = a + b, r2 = c + d, c1 = a + c, c2 = b + d;
    const denom = r1 * r2 * c1 * c2;
    if (denom <= 0) return 0;
    let diff = Math.abs(a * d - b * c);
    if (yates) diff = Math.max(0, diff - n / 2);
    return n * diff * diff / denom;
}

function testPvalue(xT, nT, xC, nC, method, side) {
    const a = xT, b = nT - xT, c = xC, d = nC - xC;
    if (method === 'fisher') return fisherPvalue(a, b, c, d, side);
    const stat = chiSquareStat(a, b, c, d, method === 'yates');
    const pTwo = chiSq1Pvalue(stat);
    if (side === 'two') return pTwo;
    const dir = (xT / nT) >= (xC / nC) ? 1 : -1;
    return dir > 0 ? Math.min(1, pTwo / 2) : 1 - Math.min(1, pTwo / 2);
}

function methodLabel(m) { return m === 'chisq' ? 'χ²補正無' : m === 'yates' ? 'χ²補正有' : 'Fisher'; }
function sideLabel(s) { return s === 'one' ? '片側' : '両側'; }

function logGamma(z) {
    const p = [
        676.5203681218851, -1259.1392167224028, 771.3234287776531,
        -176.6150291621406, 12.507343278686905, -0.13857109526572012,
        9.984369578019572e-6, 1.5056327351493116e-7
    ];
    if (z < 0.5) return Math.log(Math.PI) - Math.log(Math.sin(Math.PI * z)) - logGamma(1 - z);
    z -= 1;
    let x = 0.9999999999998099;
    for (let i = 0; i < p.length; i++) x += p[i] / (z + i + 1);
    const t = z + p.length - 0.5;
    return 0.9189385332046727 + (z + 0.5) * Math.log(t) - t + Math.log(x);
}

function logBeta(a, b) { return logGamma(a) + logGamma(b) - logGamma(a + b); }

function betaPDF(x, a, b) {
    if (x <= 0 || x >= 1) return 0;
    return Math.exp((a - 1) * Math.log(x) + (b - 1) * Math.log(1 - x) - logBeta(a, b));
}

function betaContinuedFraction(a, b, x) {
    const maxIterations = 120;
    const eps = 3e-10;
    const fpmin = 1e-30;
    const qab = a + b;
    const qap = a + 1;
    const qam = a - 1;
    let c = 1;
    let d = 1 - qab * x / qap;
    if (Math.abs(d) < fpmin) d = fpmin;
    d = 1 / d;
    let h = d;
    for (let m = 1; m <= maxIterations; m++) {
        const m2 = 2 * m;
        let aa = m * (b - m) * x / ((qam + m2) * (a + m2));
        d = 1 + aa * d;
        if (Math.abs(d) < fpmin) d = fpmin;
        c = 1 + aa / c;
        if (Math.abs(c) < fpmin) c = fpmin;
        d = 1 / d;
        h *= d * c;
        aa = -(a + m) * (qab + m) * x / ((a + m2) * (qap + m2));
        d = 1 + aa * d;
        if (Math.abs(d) < fpmin) d = fpmin;
        c = 1 + aa / c;
        if (Math.abs(c) < fpmin) c = fpmin;
        d = 1 / d;
        const del = d * c;
        h *= del;
        if (Math.abs(del - 1) < eps) break;
    }
    return h;
}

function betaCDF(x, a, b) {
    if (x <= 0) return 0;
    if (x >= 1) return 1;
    const bt = Math.exp(logGamma(a + b) - logGamma(a) - logGamma(b) + a * Math.log(x) + b * Math.log(1 - x));
    if (x < (a + 1) / (a + b + 2)) return bt * betaContinuedFraction(a, b, x) / a;
    return 1 - bt * betaContinuedFraction(b, a, 1 - x) / b;
}

function betaBinomialProbs(n, a, b) {
    const probs = [];
    const base = logBeta(a, b);
    let total = 0;
    for (let k = 0; k <= n; k++) {
        const value = Math.exp(logChoose(n, k) + logBeta(k + a, n - k + b) - base);
        probs.push(value);
        total += value;
    }
    return probs.map(v => v / total);
}

function findThreshold(nT, nC, pC, alpha, method, side) {
    const xC = Math.round(nC * pC);
    for (let xT = 0; xT <= nT; xT++) {
        const rateT = xT / nT;
        if (rateT + 1e-12 < xC / nC) continue;
        const pv = testPvalue(xT, nT, xC, nC, method, side);
        if (pv <= alpha) return { xT, xC, rateT, rateCobs: xC / nC, riskDiff: rateT - xC / nC, pvalue: pv };
    }
    return null;
}

function selectedDigits(id, fallback) {
    const el = document.getElementById(id);
    const value = el ? Number(el.value) : fallback;
    return Number.isInteger(value) ? value : fallback;
}
function probabilityDigits() { return selectedDigits('probabilityDigits', 1); }
function pvalueDigits() { return selectedDigits('pvalueDigits', 3); }
function thresholdDigits() { return selectedDigits('thresholdDigits', 3); }
function formatFixed(value, digits) { const n = Number(value); return Number.isFinite(n) ? n.toFixed(digits) : '-'; }
function formatProbabilityPercent(value) { return formatFixed(value, probabilityDigits()); }
function formatAlphaP(value) { return formatFixed(value, pvalueDigits()); }
function formatThresholdPercent(value) { return formatFixed(value, thresholdDigits()); }
function inputDecimalPlaces(id) {
    const raw = String(document.getElementById(id)?.value || '');
    const match = raw.match(/[.,](\d+)/);
    return match ? match[1].length : 0;
}
function formatLikeInput(value, inputId) { return formatFixed(value, inputDecimalPlaces(inputId)); }

function predictiveSummary(nT, nC, probsT, probsC, thresholdRiskDiff) {
    const map = new Map();
    const conditionalItems = [];
    let probability = 0;
    let conditionalSum = 0;
    for (let xT = 0; xT <= nT; xT++) {
        for (let xC = 0; xC <= nC; xC++) {
            const prob = probsT[xT] * probsC[xC];
            const riskDiff = xT / nT - xC / nC;
            const key = (riskDiff * 100).toFixed(6);
            map.set(key, (map.get(key) || 0) + prob * 100);
            if (riskDiff + 1e-12 >= thresholdRiskDiff) {
                probability += prob;
                conditionalSum += prob * riskDiff;
                conditionalItems.push({ riskDiff, prob });
            }
        }
    }
    let conditionalMedianRiskDiff = NaN;
    if (probability > 0) {
        conditionalItems.sort((a, b) => a.riskDiff - b.riskDiff);
        let conditionalCumulative = 0;
        for (const item of conditionalItems) {
            conditionalCumulative += item.prob / probability;
            if (conditionalCumulative >= 0.5) {
                conditionalMedianRiskDiff = item.riskDiff;
                break;
            }
        }
    }
    const density = Array.from(map.entries()).map(([x, y]) => ({ x: Number(x), y })).sort((a, b) => a.x - b.x);
    let tail = 0;
    const survival = [];
    for (let i = density.length - 1; i >= 0; i--) {
        tail += density[i].y;
        survival.push({ x: density[i].x, y: tail });
    }
    survival.reverse();
    return {
        probability,
        conditionalExpectedRiskDiff: probability > 0 ? conditionalSum / probability : NaN,
        conditionalMedianRiskDiff,
        density,
        survival
    };
}

const verticalLinePlugin = {
    id: 'verticalThresholdLine',
    afterDatasetsDraw(chart, args, opts) {
        if (!opts || !Number.isFinite(opts.value)) return;
        const { ctx, chartArea, scales } = chart;
        const x = scales.x.getPixelForValue(opts.value);
        if (x < chartArea.left || x > chartArea.right) return;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x, chartArea.top);
        ctx.lineTo(x, chartArea.bottom);
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#d32f2f';
        ctx.setLineDash([6, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#d32f2f';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText('閾値RD', Math.min(x + 6, chartArea.right - 60), chartArea.top + 6);
        ctx.restore();
    }
};
if (typeof Chart !== 'undefined') Chart.register(verticalLinePlugin);

let charts = {};
let history = [];
let counter = 0;

    charts.priorDensityChart = new Chart(document.getElementById('priorDensityChart'), {

function updateCharts(params) {
    createPriorChart(params.aT, params.bT, params.aC, params.bC);
    createPredictiveChart('predictiveDensityChart', '予測分布', params.density, params.thresholdPct, false);
    createPredictiveChart('predictiveSurvivalChart', '予測分布 1-CDF', params.survival, params.thresholdPct, true);
    updateChartVisibility();
}

function calculatePredictiveProbability() {
    const calculationMode = document.getElementById('calculationMode').value;
    const method = document.getElementById('testMethod').value;
    const side = calculationMode === 'threshold' ? 'one' : document.getElementById('testSide').value;
    const alphaInput = safeNum('alphaInput', 0.025);
    const thresholdInput = safeNum('thresholdRiskDifference', 15) / 100;
    const nTP = safeNum('sampleSizeTreat', 90);
    const nCP = safeNum('sampleSizeControl', 90);
    const pT = safeNum('priorRateTreat', 45) / 100;
    const pC = safeNum('priorRateControl', 25) / 100;
    const essT = safeNum('priorEssTreat', 60);
    const essC = safeNum('priorEssControl', 60);
    const discountRate = safeNum('discountRate', 15);
    const dropoutTreat = safeNum('dropoutRateTreat', 1);
    const dropoutControl = safeNum('dropoutRateControl', 1);
    const rounding = document.getElementById('roundingMethod').value;

    if (!(nTP >= 1 && nCP >= 1)) return showError('予定症例数は各群1以上にしてください。');
    if (!(pT > 0 && pT < 1 && pC > 0 && pC < 1)) return showError('ベータ事前分布を作るため、事前奏功割合は0%より大きく100%より小さい値にしてください。');
    if (!(essT > 0 && essC > 0)) return showError('事前ESSは治療群・対照群とも0より大きい値にしてください。');
    if (!(discountRate >= 0 && discountRate <= 100)) return showError('割引率は0%以上100%以下にしてください。');
    if (!(dropoutTreat >= 0 && dropoutTreat < 100 && dropoutControl >= 0 && dropoutControl < 100)) return showError('脱落率は0%以上100%未満にしてください。');

    const nT = Math.max(1, rounding === 'round' ? Math.round(nTP * (1 - dropoutTreat / 100)) : Math.floor(nTP * (1 - dropoutTreat / 100)));
    const nC = Math.max(1, rounding === 'round' ? Math.round(nCP * (1 - dropoutControl / 100)) : Math.floor(nCP * (1 - dropoutControl / 100)));
    const aT = pT * essT, bT = (1 - pT) * essT;
    const aC = pC * essC, bC = (1 - pC) * essC;

    let alpha, thresholdRiskDiff, thresholdText, thresholdCountText, pvalueText, modeLabel, testLabel;
    if (calculationMode === 'alpha') {
        if (!(alphaInput > 0 && alphaInput < 1)) return showError('αは0より大きく1より小さい値にしてください。');
        alpha = alphaInput;
        const threshold = findThreshold(nT, nC, pC, alpha, method, side);
        if (!threshold) return showError('この条件では実現可能範囲内に有意閾値がありません。');
        thresholdRiskDiff = threshold.riskDiff;
        thresholdText = formatThresholdPercent(thresholdRiskDiff * 100);
        thresholdCountText = `治療 ${threshold.xT}/${nT}、対照 ${threshold.xC}/${nC}`;
        pvalueText = formatAlphaP(threshold.pvalue);
        modeLabel = 'α指定';
        testLabel = `${methodLabel(method)}・${sideLabel(side)}`;
    } else {
        if (!(thresholdInput >= -1 && thresholdInput <= 1)) return showError('有意閾値リスク差は-100%以上100%以下で入力してください。');
        thresholdRiskDiff = thresholdInput;
        const xC = Math.round(nC * pC);
        const xT = Math.ceil(((xC / nC) + thresholdRiskDiff) * nT - 1e-12);
        if (xT < 0 || xT > nT) return showError('この対照群事前奏功割合とリスク差の組合せでは、実現可能な治療群奏功割合を超えます。');
        alpha = testPvalue(xT, nT, xC, nC, method, 'one');
        thresholdText = formatLikeInput(thresholdRiskDiff * 100, 'thresholdRiskDifference');
        thresholdCountText = `治療 ${xT}/${nT}、対照 ${xC}/${nC}`;
        pvalueText = formatAlphaP(alpha);
        modeLabel = '閾値指定';
        testLabel = `${methodLabel(method)}・片側`;
    }

    const probsT = betaBinomialProbs(nT, aT, bT);
    const probsC = betaBinomialProbs(nC, aC, bC);
    const summary = predictiveSummary(nT, nC, probsT, probsC, thresholdRiskDiff);
    const successProbability = summary.probability * (1 - discountRate / 100);
    const conditionalExpectedText = Number.isFinite(summary.conditionalExpectedRiskDiff) ? formatThresholdPercent(summary.conditionalExpectedRiskDiff * 100) : '計算不可';
    const conditionalMedianText = Number.isFinite(summary.conditionalMedianRiskDiff) ? formatThresholdPercent(summary.conditionalMedianRiskDiff * 100) : '計算不可';

    document.getElementById('ppResult').innerHTML = `
        <div class="result-main-line"><span class="result-label">現実的な成功確率</span><strong style="color:#28a745;">${formatProbabilityPercent(successProbability * 100)}%</strong></div>
        <div style="font-size:15px; color:#555; margin-top:4px;">予測確率 <span class="predictive-probability">${formatProbabilityPercent(summary.probability * 100)}%</span> × (1 - 割引率 ${formatLikeInput(discountRate, 'discountRate')}%)</div>
    `;
    document.getElementById('detailResult').innerHTML = `
        入力モード: <strong>${modeLabel}</strong> / α: <strong>${formatAlphaP(alpha)}</strong> / 検定: <strong>${testLabel}</strong> / 有意閾値RD: <strong>${thresholdText}%</strong><br>
        脱落率: 治療群 <strong>${formatLikeInput(dropoutTreat, 'dropoutRateTreat')}%</strong>、対照群 <strong>${formatLikeInput(dropoutControl, 'dropoutRateControl')}%</strong> / 脱落後N: 治療群 <strong>${nT}</strong>、対照群 <strong>${nC}</strong><br>
        事前分布: 治療群 Beta(${formatThresholdPercent(aT)}, ${formatThresholdPercent(bT)})、対照群 Beta(${formatThresholdPercent(aC)}, ${formatThresholdPercent(bC)})<br>
        予測分布: 閾値以上の場合のRD期待値 <strong>${conditionalExpectedText}%</strong> / RD中央値 <strong>${conditionalMedianText}%</strong> / 閾値例数: ${thresholdCountText} / 閾値p値: ${pvalueText}
    `;

    updateCharts({ aT, bT, aC, bC, density: summary.density, survival: summary.survival, thresholdPct: thresholdRiskDiff * 100 });

    counter++;
    history.unshift({
        no: counter,
        nTP, nT, nCP, nC,
        dropout: `${formatLikeInput(dropoutTreat, 'dropoutRateTreat')}% / ${formatLikeInput(dropoutControl, 'dropoutRateControl')}%`,
        priorEss: `${formatLikeInput(essT, 'priorEssTreat')} / ${formatLikeInput(essC, 'priorEssControl')}`,
        priorRates: `${formatLikeInput(pT * 100, 'priorRateTreat')}% / ${formatLikeInput(pC * 100, 'priorRateControl')}%`,
        threshold: thresholdText,
        thresholdCount: thresholdCountText,
        conditionalExpected: conditionalExpectedText,
        conditionalMedian: conditionalMedianText,
        alpha: formatAlphaP(alpha),
        test: testLabel,
        predictive: formatProbabilityPercent(summary.probability * 100),
        discount: formatLikeInput(discountRate, 'discountRate'),
        success: formatProbabilityPercent(successProbability * 100)
    });
    renderHistory();
}

function showError(message) {
    document.getElementById('ppResult').innerHTML = `<span style="color:#dc3545;">${message}</span>`;
    document.getElementById('detailResult').innerHTML = '';
}

function renderHistory() {
    const tbody = document.getElementById('historyBody');
    tbody.innerHTML = '';
    history.forEach((item, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><div class="move-buttons"><button class="move-btn" onclick="moveHistoryItem(${index}, -1)" ${index === 0 ? 'disabled' : ''}>▲</button><button class="move-btn" onclick="moveHistoryItem(${index}, 1)" ${index === history.length - 1 ? 'disabled' : ''}>▼</button></div></td>
            <td>${item.nTP} <small>(${item.nT})</small></td>
            <td>${item.nCP} <small>(${item.nC})</small></td>
            <td>${item.dropout}</td>
            <td>${item.priorEss}</td>
            <td>${item.priorRates}</td>
            <td style="font-weight:bold;color:#d32f2f;">${item.threshold}</td>
            <td>${item.thresholdCount}</td>
            <td>${item.conditionalExpected}</td>
            <td>${item.conditionalMedian}</td>
            <td>${item.alpha}</td>
            <td>${item.test}</td>
            <td style="font-weight:bold;color:#1565c0;">${item.predictive}%</td>
            <td>${item.discount}%</td>
            <td style="font-weight:bold;color:#28a745;">${item.success}%</td>
            <td><button class="delete-btn" onclick="deleteHistoryItem(${index})">削除</button></td>
        `;
        tbody.appendChild(row);
    });
}

window.moveHistoryItem = function(index, direction) {
    const next = index + direction;
    if (next < 0 || next >= history.length) return;
    const [item] = history.splice(index, 1);
    history.splice(next, 0, item);
    renderHistory();
};

window.deleteHistoryItem = function(index) {
    history.splice(index, 1);
    renderHistory();
};

function clearHistory() {
    history = [];
    counter = 0;
    renderHistory();
}

    slide.background = { color: 'F7F9FC' };
    slide.addShape('rect', { x: 0, y: 0, w: 13.333, h: 0.18, fill: { color: '1565C0' }, line: { color: '1565C0' } });
    slide.addText(title, { x: 0.55, y: 0.35, w: 12.2, h: 0.42, fontFace: 'Aptos', fontSize: 22, bold: true, color: '263238', margin: 0 });
    if (subtitle) slide.addText(subtitle, { x: 0.57, y: 0.82, w: 12, h: 0.24, fontFace: 'Aptos', fontSize: 9, color: '65737E', margin: 0 });
}
function addPptChart(slide, chartId, title, x, y, w, h) {
    if (!charts[chartId]) return;
    slide.addText(title, { x, y, w, h: 0.18, align: 'center', fontFace: 'Aptos', fontSize: 8.5, bold: true, color: '264F73', margin: 0 });
    slide.addImage({ data: charts[chartId].toBase64Image(), x, y: y + 0.20, w, h });
}

        slide.addText('予測確率', { x: 0.76, y: 1.75, w: 0.82, h: 0.22, fontFace: 'Aptos', fontSize: 11, color: '555555', margin: 0 });

        const summaryRows = [

        const stamp = new Date().toISOString().slice(0, 10).replace(/-/g, '');

        console.error(error);
        alert(`PowerPointの作成に失敗しました: ${error.message || error}`);

        button.textContent = 'PowerPointをダウンロード';

}

function updateChartVisibility() {
    document.getElementById('priorChartSection').classList.toggle('hidden-chart', !document.getElementById('showPriorCharts').checked);
    document.getElementById('predictiveChartSection').classList.toggle('hidden-chart', !document.getElementById('showPredictiveCharts').checked);
    Object.values(charts).forEach(chart => { if (chart) chart.resize(); });
}

function updateInputMode() {
    const isThresholdMode = document.getElementById('calculationMode').value === 'threshold';
    document.getElementById('alphaInput').disabled = isThresholdMode;
    document.getElementById('thresholdRiskDifference').disabled = !isThresholdMode;
    document.getElementById('alphaInput').classList.toggle('disabled-input', isThresholdMode);
    document.getElementById('thresholdRiskDifference').classList.toggle('disabled-input', !isThresholdMode);
    document.getElementById('testSide').disabled = isThresholdMode;
    document.getElementById('testSide').classList.toggle('disabled-input', isThresholdMode);
    if (isThresholdMode) document.getElementById('testSide').value = 'one';
}

document.getElementById('calculationMode').addEventListener('change', () => { updateInputMode(); calculatePredictiveProbability(); });
document.getElementById('showPriorCharts').addEventListener('change', updateChartVisibility);
document.getElementById('showPredictiveCharts').addEventListener('change', updateChartVisibility);
document.getElementById('probabilityDigits').addEventListener('change', calculatePredictiveProbability);
document.getElementById('pvalueDigits').addEventListener('change', calculatePredictiveProbability);
document.getElementById('thresholdDigits').addEventListener('change', calculatePredictiveProbability);

window.onload = function() {
    updateInputMode();
    calculatePredictiveProbability();
    updateChartVisibility();
};
